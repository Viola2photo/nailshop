<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>雲端智能建檔系統 (Vercel 全功能版)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-[#FDFDFD] text-gray-800 font-sans selection:bg-pink-100">
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyDQZGeeubB8bEUL59v9yt0QBAfIWJcvgnw",
      authDomain: "nailproject-40022.firebaseapp.com",
      projectId: "nailproject-40022",
      storageBucket: "nailproject-40022.firebasestorage.app",
      messagingSenderId: "1004628981925",
      appId: "1:1004628981925:web:db01ede0c09f4071d5754c"
    };

    // ✨ 您的 Gemini API Key
    const GEMINI_API_KEY = "AIzaSyDznYhxz5z7WNqQtyQa1DtLilqYwSncUq0"; 

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'nail-inventory-app';

    const { useState, useRef, useEffect, useMemo } = React;

    const NAIL_SHAPES = ['超短梯', '短梯', '中梯', '長梯', '超長梯', '短橢圓', '中橢圓', '長橢圓', '細狗尖', '杏仁甲', '中杏仁', '長杏仁', '短圓', '新中方', '長水滴'];
    const COPYWRITING_STYLES = ['隨機驚喜', '法式優雅名媛', '日系甜美純慾', '歐美個性暗黑', '極簡高階質感', '活潑可愛少女'];

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
      const bgColor = type === 'success' ? 'bg-gray-900' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
      return (
        <div className={`fixed bottom-24 md:bottom-10 left-1/2 transform -translate-x-1/2 w-[90%] md:w-auto max-w-sm ${bgColor} text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 z-[100] border border-white/10 animate-bounce`}>
          <span className="text-xl">{type === 'success' ? '✅' : '⚠️'}</span>
          <span className="font-bold text-sm tracking-wide">{message}</span>
        </div>
      );
    };

    const loadImage = (src) => new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });

    const cropImageFromBox = (imgElement, box) => {
      try {
        let [ymin, xmin, ymax, xmax] = box;
        if (xmax <= 1 && ymax <= 1) { ymin *= 1000; xmin *= 1000; ymax *= 1000; xmax *= 1000; }
        xmin = Math.max(0, xmin); ymin = Math.max(0, ymin);
        xmax = Math.min(1000, xmax); ymax = Math.min(1000, ymax);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const sx = (xmin / 1000) * imgElement.naturalWidth;
        const sy = (ymin / 1000) * imgElement.naturalHeight;
        const sw = ((xmax - xmin) / 1000) * imgElement.naturalWidth;
        const sh = ((ymax - ymin) / 1000) * imgElement.naturalHeight;
        if(sw <= 0 || sh <= 0) return null;
        canvas.width = sw; canvas.height = sh;
        ctx.drawImage(imgElement, sx, sy, sw, sh, 0, 0, sw, sh);
        return canvas.toDataURL('image/jpeg', 0.9);
      } catch (e) { return null; }
    };

    const compressImage = (file, maxRes = 800) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width: w, height: h } = img;
            if (w > h && w > maxRes) { h *= maxRes / w; w = maxRes; } 
            else if (h > maxRes) { w *= maxRes / h; h = maxRes; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    function App() {
      const [activeTab, setActiveTab] = useState('inventory');
      const [inventory, setInventory] = useState([]);
      const [toastMsg, setToastMsg] = useState(null);
      const [user, setUser] = useState(null);
      const [isLoadingDB, setIsLoadingDB] = useState(true);

      const [isScanning, setIsScanning] = useState(false);
      const [drafts, setDrafts] = useState([]); 
      const [uploadStyle, setUploadStyle] = useState('隨機驚喜');
      
      const [isStockTaking, setIsStockTaking] = useState(false);
      const [scanSession, setScanSession] = useState({}); 
      const [unknownScans, setUnknownScans] = useState([]);
      const [showCompareModal, setShowCompareModal] = useState(false);
      const [editingItem, setEditingItem] = useState(null);

      const cameraInputRef = useRef(null);
      const galleryInputRef = useRef(null);
      const scanCameraRef = useRef(null);
      const scanGalleryRef = useRef(null);
      const editFileInputRef = useRef(null);

      const showToast = (message, type = 'success') => setToastMsg({ message, type });

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(setUser);
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) { setIsLoadingDB(false); return; }
        const inventoryRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory');
        const unsubDB = inventoryRef.onSnapshot((snapshot) => {
          const dbData = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
          dbData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          setInventory(dbData);
          setIsLoadingDB(false);
        });
        return () => unsubDB();
      }, [user]);

      const callGeminiAI = async (base64Data, promptText) => {
        try {
          const result = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }, ...(base64Data ? [{ inlineData: { mimeType: "image/jpeg", data: base64Data } }] : []) ] }],
              systemInstruction: { parts: [{ text: "只輸出乾淨的 JSON 或純文字，依照指示行事。" }] },
              generationConfig: { responseMimeType: base64Data ? "application/json" : "text/plain" }
            })
          });
          const jsonRes = await result.json();
          if (jsonRes.error) throw new Error(jsonRes.error.message);
          const text = jsonRes.candidates?.[0]?.content?.parts?.[0]?.text || '';
          if(!base64Data) return text; 
          return JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());
        } catch(e) { 
          showToast(`AI 發生錯誤: ${e.message}`, "error"); 
          return base64Data ? { items: [] } : "";
        }
      };

      const handleRewriteDescription = async (isEditing, currentName, draftUid = null) => {
        showToast("AI 靈感湧現中...", "success");
        const prompt = `你是一個美甲文案專家。商品名為「${currentName}」。請撰寫一段約 30 字的生動穿戴甲商品描述，並附上3個標籤(#)。`;
        const newDesc = await callGeminiAI(null, prompt);
        if(newDesc) {
           if(isEditing) setEditingItem(prev => ({ ...prev, description: newDesc.trim() }));
           else if (draftUid) updateDraft(draftUid, 'description', newDesc.trim());
           showToast("✨ 風格切換成功！");
        }
      };

      // 🔍 盤點邏輯
      const handleBatchScanUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return; e.target.value = ''; 
        setIsStockTaking(true);
        try {
          const base64DataUrl = await compressImage(file, 1600);
          const base64Data = base64DataUrl.split(',')[1];
          const prompt = `盤點照片中的每一副穿戴甲。對比現有庫存：${JSON.stringify(inventory.map(i => ({ id: i.id, name: i.name })))}。
          回傳 JSON：{"knownItems": [{"matchedId": "ID", "detectedSize": "XS/S/M/L"}], "unknownItems": [{"box2d": [y,x,y,x], "suggestedName": "名稱", "detectedSize": "S"}]}`;
          
          const data = await callGeminiAI(base64Data, prompt);
          const knowns = data.knownItems || [];
          const unknowns = data.unknownItems || [];
          
          setScanSession(prev => {
            let newSession = { ...prev };
            knowns.forEach(res => {
              const item = inventory.find(i => i.id === res.matchedId);
              if (item) {
                const size = res.detectedSize || 'M';
                const count = (newSession[item.id] || {})[size] || 0;
                newSession[item.id] = { ...(newSession[item.id] || {}), [size]: count + 1 };
              }
            });
            return newSession;
          });

          if (unknowns.length > 0) {
            const imgEl = await loadImage(base64DataUrl);
            const processed = unknowns.map(u => ({ ...u, uid: Math.random(), croppedUrl: cropImageFromBox(imgEl, u.box2d) || base64DataUrl }));
            setUnknownScans(prev => [...prev, ...processed]);
          }
          showToast(`盤點分析完成！`);
        } catch (err) { showToast("分析錯誤", "error"); } finally { setIsStockTaking(false); }
      };

      // ➕ 建檔邏輯
      const handleBatchCreationUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return; e.target.value = '';
        setIsScanning(true); setDrafts([]);
        try {
          const aiUrl = await compressImage(file, 1600);
          const dbUrl = await compressImage(file, 800);
          const base64 = aiUrl.split(',')[1];
          const style = uploadStyle === '隨機驚喜' ? '多樣化的' : uploadStyle;
          const prompt = `辨識照片中的每一套穿戴甲。對比：${JSON.stringify(inventory.map(i => ({ id: i.id, name: i.name })))}。
          回傳 JSON：{"items": [{"matchedId": "ID", "detectedSize": "S", "styleName": "名", "description": "文案", "shape": "甲型", "hashtags": "#標籤"}]}`;
          
          const data = await callGeminiAI(base64, prompt);
          const items = data.items || [];
          const newDrafts = items.map((item, i) => {
            const matchedItem = item.matchedId ? inventory.find(inv => inv.id === item.matchedId) : null;
            return {
              uid: `draft-${Date.now()}-${i}`, isMatch: !!matchedItem, matchedItem,
              mediaRaw: { url: dbUrl, extension: 'jpg', type: 'image' },
              formData: {
                id: matchedItem ? matchedItem.id : `NAIL-${Math.floor(Math.random()*10000).toString().padStart(4,'0')}`,
                name: matchedItem ? matchedItem.name : (item.styleName || '新商品'),
                price: matchedItem ? matchedItem.price : 390,
                description: matchedItem ? matchedItem.description : (item.description || ''),
                shape: matchedItem ? matchedItem.shape : (NAIL_SHAPES.includes(item.shape) ? item.shape : ''),
                hashtags: matchedItem ? matchedItem.hashtags : (item.hashtags || ''),
                detectedSize: item.detectedSize || 'M',
                stock: { XS: 0, S: 0, M: 0, L: 0, ...(item.detectedSize && !matchedItem ? { [item.detectedSize]: 1 } : {}) }
              }
            };
          });
          setDrafts(newDrafts);
        } catch (err) { showToast("建檔分析失敗", "error"); } finally { setIsScanning(false); }
      };

      const updateDraft = (uid, field, val) => setDrafts(prev => prev.map(d => d.uid === uid ? { ...d, formData: { ...d.formData, [field]: val } } : d));
      const diffList = useMemo(() => {
        const list = [];
        for (const [id, sizes] of Object.entries(scanSession)) {
          const item = inventory.find(i => i.id === id);
          if (!item) continue;
          for (const [size, count] of Object.entries(sizes)) {
            list.push({ id, name: item.name, image: item.media?.[0]?.url, size, system: item.stock[size]||0, scanned: count });
          }
        }
        return list;
      }, [scanSession, inventory]);

      const handleSaveAllDrafts = async () => {
        if (!user || drafts.length === 0) return;
        const batch = db.batch();
        for (const d of drafts) {
          const ref = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(d.formData.id);
          if (d.isMatch) {
            const newStock = { ...d.matchedItem.stock };
            newStock[d.formData.detectedSize] = (newStock[d.formData.detectedSize] || 0) + 1;
            batch.update(ref, { stock: newStock });
          } else {
            batch.set(ref, { ...d.formData, media: [{ ...d.mediaRaw, id: Date.now().toString() }], createdAt: new Date().toISOString() });
          }
        }
        await batch.commit();
        setDrafts([]); setActiveTab('inventory'); showToast("儲存成功！");
      };

      const openEditModal = (item) => setEditingItem(JSON.parse(JSON.stringify(item)));
      const closeEditModal = () => setEditingItem(null);
      const handleEditMediaUpload = async (e) => {
        const files = e.target.files; if (!files.length) return;
        const promises = Array.from(files).map(async f => ({ id: Math.random().toString(), type: f.type.includes('video') ? 'video' : 'image', url: await compressImage(f), extension: 'jpg' }));
        const res = await Promise.all(promises);
        setEditingItem(prev => ({ ...prev, media: [...(prev.media||[]), ...res] }));
      };
      const saveEditedItem = async () => {
        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).update(editingItem);
        closeEditModal(); showToast("修改已儲存！");
      };

      if (!user) return (
        <div className="min-h-screen flex items-center justify-center bg-gray-50">
          <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="bg-white px-8 py-4 rounded-2xl shadow-xl font-bold border border-gray-100 flex items-center gap-3">🌐 登入後台系統</button>
        </div>
      );

      return (
        <div className="pb-24">
          {toastMsg && <Toast message={toastMsg.message} type={toastMsg.type} onClose={() => setToastMsg(null)} />}
          
          <input type="file" ref={cameraInputRef} onChange={handleBatchCreationUpload} className="hidden" />
          <input type="file" ref={galleryInputRef} onChange={handleBatchCreationUpload} className="hidden" />
          <input type="file" ref={scanCameraRef} onChange={handleBatchScanUpload} className="hidden" />
          <input type="file" ref={scanGalleryRef} onChange={handleBatchScanUpload} className="hidden" />

          <header className="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-20 px-4 py-3 flex justify-between items-center">
            <h1 className="font-black text-lg">☁️ 雲端智能建檔</h1>
            <nav className="flex gap-4">
              <button onClick={() => setActiveTab('inventory')} className={`font-bold text-sm ${activeTab==='inventory'?'text-blue-600':'text-gray-400'}`}>總覽</button>
              <button onClick={() => setActiveTab('scan')} className={`font-bold text-sm ${activeTab==='scan'?'text-blue-600':'text-gray-400'}`}>盤點</button>
              <button onClick={() => setActiveTab('upload')} className={`font-bold text-sm ${activeTab==='upload'?'text-blue-600':'text-gray-400'}`}>建檔</button>
            </nav>
          </header>

          <main className="max-w-6xl mx-auto p-4">
            {activeTab === 'inventory' && (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {inventory.map(item => (
                  <div key={item.id} onClick={() => openEditModal(item)} className="bg-white rounded-2xl p-3 shadow-sm border border-gray-100 relative cursor-pointer">
                    <img src={item.media?.[0]?.url} className="w-full aspect-[4/5] object-cover rounded-xl mb-2" />
                    <h3 className="font-bold text-sm truncate">{item.name}</h3>
                    <div className="flex gap-1 mt-2">
                       {['XS','S','M','L'].map(s => <div key={s} className="flex-1 text-[10px] text-center bg-gray-50 rounded py-0.5">{item.stock[s]}</div>)}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'scan' && (
              <div className="max-w-md mx-auto space-y-4">
                <div className="bg-white p-8 rounded-3xl shadow-sm text-center border">
                  <div className="text-5xl mb-4">🔍</div>
                  <h2 className="font-black text-xl mb-4">智能盤點模式</h2>
                  <div className="flex gap-2">
                    <button onClick={() => scanCameraRef.current.click()} className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">📸 拍照</button>
                    <button onClick={() => scanGalleryRef.current.click()} className="flex-1 border-2 border-blue-600 text-blue-600 py-3 rounded-xl font-bold">🖼️ 相簿</button>
                  </div>
                </div>
                {diffList.length > 0 && (
                  <div className="bg-white rounded-2xl border p-4">
                    <h3 className="font-bold mb-3">📊 盤點清單</h3>
                    <div className="space-y-2">
                      {diffList.map((d,i) => (
                        <div key={i} className="flex justify-between items-center text-sm border-b pb-2">
                          <span>{d.name} ({d.size})</span>
                          <span className="font-bold">系統 {d.system} → <span className="text-blue-600">{d.scanned}</span></span>
                        </div>
                      ))}
                    </div>
                    <button onClick={() => setShowCompareModal(true)} className="w-full bg-gray-900 text-white py-3 rounded-xl mt-4 font-bold">更新至雲端</button>
                  </div>
                )}
              </div>
            )}

            {activeTab === 'upload' && (
              <div>
                {isScanning ? <div className="text-center py-20 font-bold">AI 正在努力辨識中...</div> : drafts.length === 0 ? (
                   <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed max-w-lg mx-auto">
                     <div className="text-5xl mb-4">➕</div>
                     <p className="font-bold text-gray-400 mb-6">請上傳穿戴甲照片，AI 會自動幫您填寫資料</p>
                     <button onClick={() => cameraInputRef.current.click()} className="bg-gray-900 text-white px-10 py-4 rounded-xl font-bold shadow-lg">開始 AI 建檔</button>
                   </div>
                ) : (
                  <div className="space-y-4">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {drafts.map(d => (
                        <div key={d.uid} className="bg-white p-4 rounded-2xl border-2 border-blue-100 flex gap-4">
                          <img src={d.mediaRaw.url} className="w-24 aspect-[3/4] object-cover rounded-xl" />
                          <div className="flex-1 space-y-2">
                            <input value={d.formData.name} onChange={e => updateDraft(d.uid, 'name', e.target.value)} className="w-full font-bold border-b outline-none" />
                            <div className="flex justify-between items-center">
                               <span className="text-xs text-gray-400">AI 描述:</span>
                               <button onClick={() => handleRewriteDescription(false, d.formData.name, d.uid)} className="text-[10px] bg-blue-50 text-blue-600 px-2 rounded">✨ 換文案</button>
                            </div>
                            <textarea value={d.formData.description} onChange={e => updateDraft(d.uid, 'description', e.target.value)} className="w-full text-xs bg-gray-50 p-2 rounded h-12 outline-none" />
                            <div className="flex gap-2">
                               <div className="flex-1 text-[10px] font-bold text-blue-600">{d.formData.shape}</div>
                               <div className="flex-1 text-[10px] font-bold text-blue-400">{d.formData.hashtags}</div>
                               <div className="bg-gray-900 text-white px-2 rounded font-bold">{d.formData.detectedSize}</div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <button onClick={handleSaveAllDrafts} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg">確認無誤，儲存進雲端庫存</button>
                  </div>
                )}
              </div>
            )}
          </main>

          {editingItem && (
            <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4">
               <div className="bg-white rounded-3xl p-6 w-full max-w-lg max-h-[85vh] overflow-y-auto">
                  <div className="flex justify-between items-center mb-4"><h2 className="font-black">✏️ 編輯款式</h2><button onClick={closeEditModal}>✕</button></div>
                  <div className="space-y-4">
                     <div className="grid grid-cols-4 gap-2">
                        {editingItem.media?.map((m,i) => <img key={i} src={m.url} className="aspect-square object-cover rounded-lg" />)}
                        <button onClick={() => editFileInputRef.current.click()} className="aspect-square bg-gray-100 rounded-lg flex items-center justify-center text-2xl">+</button>
                        <input type="file" multiple ref={editFileInputRef} onChange={handleEditMediaUpload} className="hidden" />
                     </div>
                     <input value={editingItem.name} onChange={e => setEditingItem({...editingItem, name:e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl font-bold" />
                     <div className="flex justify-between items-center"><label className="text-xs font-bold text-gray-400">AI 說明</label><button onClick={() => handleRewriteDescription(true, editingItem.name)} className="text-[10px] text-blue-600">✨ 重新生成</button></div>
                     <textarea value={editingItem.description} onChange={e => setEditingItem({...editingItem, description:e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl text-sm" />
                     <div className="grid grid-cols-4 gap-2">
                        {['XS','S','M','L'].map(s => <div key={s}><div className="text-xs text-center font-bold">{s}</div><input type="number" value={editingItem.stock[s]} onChange={e => setEditingItem({...editingItem, stock:{...editingItem.stock, [s]:parseInt(e.target.value)}})} className="w-full text-center border p-2 rounded" /></div>)}
                     </div>
                     <button onClick={saveEditedItem} className="w-full bg-gray-900 text-white py-4 rounded-xl font-bold">儲存修改</button>
                  </div>
               </div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>雲端智能建檔系統 (強力 AI 修復版)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

  <style>
    @supports (padding-bottom: env(safe-area-bottom)) { .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.8rem); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    body { -webkit-tap-highlight-color: transparent; outline: none; background: #FDFDFD; color: #1A1A1A; font-family: sans-serif; font-weight: 900; }
    input, textarea, select { font-size: 16px !important; font-weight: 900; }
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); }
    .btn-scale:active { transform: scale(0.95); }
    .delete-btn { position: absolute; top: 6px; right: 6px; background: #EF4444; color: white; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; border: 2px solid white; z-index: 50; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
  </style>
</head>
<body class="selection:bg-pink-100">
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyDQZGeeubB8bEUL59v9yt0QBAfIWJcvgnw",
      authDomain: "nailproject-40022.firebaseapp.com",
      projectId: "nailproject-40022",
      storageBucket: "nailproject-40022.firebasestorage.app",
      messagingSenderId: "1004628981925",
      appId: "1:1004628981925:web:db01ede0c09f4071d5754c"
    };

    // ✨ 核心金鑰
    const GEMINI_API_KEY = "AIzaSyDznYhxz5z7WNqQtyQa1DtLilqYwSncUq0"; 

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'nail-inventory-app';

    const { useState, useRef, useEffect, useMemo } = React;

    const NAIL_SHAPES = ['超短梯', '短梯', '中梯', '長梯', '超長梯', '短橢圓', '中橢圓', '長橢圓', '細狗尖', '杏仁甲', '中杏仁', '長杏仁', '短圓', '新中方', '長水滴'];
    const COPYWRITING_STYLES = ['隨機驚喜', '法式優雅名媛', '日系甜美純慾', '歐美個性暗黑', '極簡高階質感', '活潑可愛少女'];

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 5000); return () => clearTimeout(timer); }, [onClose]);
      const bgColor = type === 'success' ? 'bg-slate-900' : 'bg-red-600';
      return (
        <div className={`fixed top-12 left-1/2 -translate-x-1/2 w-[92%] md:w-auto max-w-sm ${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[200] border border-white/10 animate-fade-in-up font-black`}>
          <span className="text-xl">{type === 'success' ? '✅' : '⚠️'}</span>
          <span className="text-sm">{message}</span>
        </div>
      );
    };

    const compressImage = (file, maxRes = 800) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width: w, height: h } = img;
            if (w > h && w > maxRes) { h *= maxRes / w; w = maxRes; } 
            else if (h > maxRes) { w *= maxRes / h; h = maxRes; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    function App() {
      const [activeTab, setActiveTab] = useState('inventory');
      const [inventory, setInventory] = useState([]);
      const [toastMsg, setToastMsg] = useState(null);
      const [isLoadingDB, setIsLoadingDB] = useState(true);
      const [user, setUser] = useState(null);

      const [isScanning, setIsScanning] = useState(false);
      const [drafts, setDrafts] = useState([]); 
      const [uploadStyle, setUploadStyle] = useState('隨機驚喜');
      const [uploadedMediaRaw, setUploadedMediaRaw] = useState(null);
      
      const [isStockTaking, setIsStockTaking] = useState(false);
      const [scanLogs, setScanLogs] = useState([]); 
      const [scanSession, setScanSession] = useState({}); 
      const [showCompareModal, setShowCompareModal] = useState(false);
      const [editingItem, setEditingItem] = useState(null);

      const cameraInputRef = useRef(null);
      const galleryInputRef = useRef(null);
      const scanCameraRef = useRef(null);
      const scanGalleryRef = useRef(null);
      const editFileInputRef = useRef(null);

      const showToast = (message, type = 'success') => setToastMsg({ message, type });

      useEffect(() => {
        const unsub = auth.onAuthStateChanged((u) => {
          setUser(u);
          if (!u) setIsLoadingDB(false);
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        const inventoryRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory');
        return inventoryRef.onSnapshot((snapshot) => {
          const dbData = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
          dbData.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
          setInventory(dbData);
          setIsLoadingDB(false);
        });
      }, [user]);

      // ✨ ✨ 強力修復：修正 404 報錯與 API 連線 ✨ ✨
      const callGeminiAI = async (base64Data, promptText) => {
        try {
          // ⚠️ 改用 v1beta 解決 404 問題，並確保 URL 格式完全正確
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [
                { text: `你是一位美甲大師與店長，請分析圖片並只回傳乾淨 JSON，不要任何 Markdown 符號。指令：${promptText}` },
                ...(base64Data ? [{ inlineData: { mimeType: "image/jpeg", data: base64Data } }] : [])
              ] }],
              // 使用 v1beta 支援的參數來確保 JSON 輸出
              generationConfig: { response_mime_type: "application/json" }
            })
          });

          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error?.message || `HTTP ${response.status}`);
          }

          const jsonRes = await response.json();
          const text = jsonRes.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
          const cleanText = text.replace(/```json/g, '').replace(/```/g, '').trim();
          return JSON.parse(cleanText);
        } catch(e) { 
          console.error("AI Error:", e);
          showToast(`AI 暫時無法回應: ${e.message}`, "error"); 
          return null;
        }
      };

      // 🔍 智慧盤點
      const handleBatchScanUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsStockTaking(true);
        try {
          const aiUrl = await compressImage(file, 1500); // 盤點需較高解析度
          const data = await callGeminiAI(aiUrl.split(',')[1], `盤點 3x3 九宮格盒。現有庫存：${JSON.stringify(inventory.map(i => ({ id: i.id, name: i.name })))}。回傳格式：{"results": [{"matchedId": "ID", "detectedSize": "XS/S/M/L"}]}`);
          if (data && data.results) {
            let newS = { ...scanSession };
            data.results.forEach(res => {
              if (res.matchedId) {
                const item = inventory.find(i => i.id === res.matchedId);
                if (item) {
                  const sz = res.detectedSize || 'M';
                  newS[item.id] = { ...(newS[item.id]||{}), [sz]: (newS[item.id]?.[sz] || 0) + 1 };
                  setScanLogs(old => [`✅ 偵測：${item.name} (${sz})`, ...old]);
                }
              }
            });
            setScanSession(newS);
            showToast("辨識完成，請點擊核對確認");
          }
        } finally { setIsStockTaking(false); e.target.value = ''; }
      };

      // ➕ AI 建檔
      const handleBatchCreationUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsScanning(true); setDrafts([]);
        try {
          const aiUrl = await compressImage(file, 1024);
          const dbUrl = await compressImage(file, 800);
          setUploadedMediaRaw({ url: dbUrl, type: 'image' });
          const data = await callGeminiAI(aiUrl.split(',')[1], `辨識建檔。風格：${uploadStyle}。已知庫存：${JSON.stringify(inventory.map(i => ({ id: i.id, name: i.name })))}。回傳：{"items": [{"styleName": "品名", "description": "100字文案", "shape": "甲型", "hashtags": "#標籤"}]}`);
          if (data && data.items) {
            setDrafts(data.items.map((it, i) => ({
              uid: `draft-${Date.now()}-${i}`,
              formData: {
                id: `NL-${Math.floor(Math.random()*9000+1000)}`, name: it.styleName || '新款',
                price: 390, description: it.description || '', shape: it.shape || '短梯',
                hashtags: it.hashtags || '', stock: { XS: 0, S: 0, M: 1, L: 0 }
              }
            })));
          }
        } finally { setIsScanning(false); e.target.value = ''; }
      };

      const handleSaveAllDrafts = async () => {
        if (!user || drafts.length === 0) return;
        const batch = db.batch();
        drafts.forEach(d => {
          const ref = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(d.formData.id);
          batch.set(ref, { ...d.formData, media: [{ ...uploadedMediaRaw, id: Date.now().toString() }], createdAt: new Date().toISOString() });
        });
        await batch.commit(); setDrafts([]); setActiveTab('inventory'); showToast("儲存成功！");
      };

      if (!user) return (
        <div className="min-h-screen flex items-center justify-center bg-slate-50 font-black">
          <div className="bg-white p-12 rounded-[50px] shadow-2xl max-w-sm w-full text-center border border-gray-100 animate-fade-in-up">
            <div className="text-7xl mb-8">💅</div>
            <h1 className="text-3xl font-black mb-10 tracking-tight">雲端管理系統</h1>
            <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full bg-black text-white py-6 rounded-3xl font-black shadow-xl btn-scale active:scale-95 transition-all">Google 登入</button>
          </div>
        </div>
      );

      return (
        <div className="pb-36 relative min-h-screen">
          {toastMsg && <Toast message={toastMsg.message} type={toastMsg.type} onClose={() => setToastMsg(null)} />}
          
          <header className="glass-effect sticky top-0 z-30 px-8 py-5 flex justify-between items-center border-b border-gray-100">
            <h1 className="font-black text-2xl tracking-tighter">MyNail. <span className="text-gray-300 font-medium italic">Cloud</span></h1>
            <button onClick={() => auth.signOut()} className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Logout</button>
          </header>

          <main className="max-w-7xl mx-auto p-4 animate-fade-in-up">
            {activeTab === 'inventory' && (
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                {isLoadingDB ? <div className="col-span-full py-40 text-center text-slate-200 text-3xl font-black">數據載入中...</div> :
                 inventory.length === 0 ? <div className="col-span-full py-40 text-center text-gray-300 font-black italic text-xl">庫存為空</div> :
                 inventory.map(item => (
                   <div key={item.docId} onClick={() => setEditingItem(JSON.parse(JSON.stringify(item)))} className="bg-white rounded-[40px] p-3 shadow-sm border border-gray-50 active:scale-95 transition-all hover:shadow-lg">
                     <div className="aspect-[4/5] rounded-[30px] overflow-hidden mb-3 bg-gray-50"><img src={item.media?.[0]?.url} className="w-full h-full object-cover" /></div>
                     <h3 className="font-black text-sm px-3 truncate mb-2">{item.name}</h3>
                     <div className="flex gap-1 px-1">{['XS','S','M','L'].map(s => <div key={s} className={`flex-1 text-[10px] text-center rounded-xl py-1.5 font-black ${item.stock?.[s]>0?'bg-slate-900 text-white':'bg-slate-100 text-slate-300'}`}>{item.stock?.[s]||0}</div>)}</div>
                   </div>
                 ))}
              </div>
            )}

            {activeTab === 'scan' && (
              <div className="max-w-md mx-auto py-10 space-y-6">
                <div className="bg-white p-12 rounded-[60px] border-2 border-dashed border-slate-200 text-center shadow-sm">
                  <div className="text-7xl mb-8">🔍</div>
                  <h2 className="text-2xl font-black mb-2">智慧盤點模式</h2>
                  <p className="text-slate-400 text-sm mb-10 font-bold">拍攝 3x3 九宮格盒進行快速核帳</p>
                  <div className="flex flex-col gap-4">
                    <button onClick={() => scanCameraRef.current.click()} className="w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-xl shadow-2xl btn-scale active:scale-95">📸 開啟相機</button>
                    <button onClick={() => scanGalleryRef.current.click()} className="w-full bg-white text-blue-600 border-2 border-blue-600 py-5 rounded-3xl font-black text-lg btn-scale active:scale-95">🖼️ 相簿選取</button>
                  </div>
                </div>
                {scanLogs.length > 0 && (
                   <div className="bg-white rounded-[40px] p-8 border shadow-sm animate-fade-in-up">
                      <div className="flex justify-between items-center mb-6 border-b pb-4"><h3 className="font-black text-xl">偵測紀錄</h3><button onClick={() => setShowCompareModal(true)} className="bg-pink-500 text-white text-xs font-black px-6 py-2.5 rounded-full shadow-lg">核對並存檔</button></div>
                      <div className="max-h-72 overflow-y-auto space-y-3 hide-scrollbar">{scanLogs.map((log, i) => <div key={i} className="text-xs bg-gray-50 p-4 rounded-2xl border border-slate-50 font-bold">{log}</div>)}</div>
                   </div>
                )}
              </div>
            )}

            {activeTab === 'upload' && (
              <div className="max-w-xl mx-auto py-8">
                {isScanning ? <div className="py-40 text-center animate-pulse font-black text-4xl text-slate-300">AI 思考中...</div> :
                 drafts.length === 0 ? (
                   <div className="bg-white rounded-[60px] border-2 border-dashed border-gray-200 p-16 text-center shadow-sm">
                     <div className="text-7xl mb-10">✨</div>
                     <h2 className="text-3xl font-black mb-10 tracking-tight">AI 批次建檔</h2>
                     <div className="mb-12">
                       <label className="block text-[11px] font-black text-gray-400 mb-3 uppercase tracking-widest text-center">文案風格偏好</label>
                       <select value={uploadStyle} onChange={(e) => setUploadStyle(e.target.value)} className="w-full bg-slate-50 border-none rounded-3xl p-5 font-black text-pink-500 text-center outline-none shadow-inner cursor-pointer appearance-none">{COPYWRITING_STYLES.map(s => <option key={s} value={s}>{s}</option>)}</select>
                     </div>
                     <div className="flex flex-col gap-4">
                       <button onClick={() => cameraInputRef.current.click()} className="w-full bg-black text-white py-6 rounded-3xl font-black text-2xl shadow-2xl btn-scale active:scale-95">📸 開啟相機</button>
                       <button onClick={() => galleryInputRef.current.click()} className="w-full bg-white text-black border-2 border-black py-5 rounded-3xl font-black text-lg btn-scale active:scale-95">🖼️ 相簿選取</button>
                     </div>
                   </div>
                 ) : (
                   <div className="space-y-6 pb-20">
                    <div className="flex justify-between items-center bg-black text-white p-6 rounded-[32px] shadow-xl"><div className="font-black text-lg">✅ 已辨識 {drafts.length} 款式</div><button onClick={() => setDrafts([])} className="text-xs bg-white/20 px-5 py-2 rounded-full font-black">重拍</button></div>
                    {drafts.map(d => (
                      <div key={d.uid} className="bg-white p-8 rounded-[48px] border-2 border-gray-50 shadow-xl space-y-5 animate-fade-in-up">
                        <input value={d.formData.name} onChange={e => setDrafts(drafts.map(it => it.uid===d.uid?{...it, formData:{...it.formData, name: e.target.value}}:it))} className="w-full font-black text-2xl outline-none border-b border-gray-100 pb-3" />
                        <textarea value={d.formData.description} onChange={e => setDrafts(drafts.map(it => it.uid===d.uid?{...it, formData:{...it.formData, description: e.target.value}}:it))} className="w-full text-sm bg-slate-50 p-5 rounded-3xl h-32 outline-none border-none text-slate-700 font-bold leading-relaxed shadow-inner" />
                        <div className="flex flex-wrap gap-3"><input placeholder="#標籤" value={d.formData.hashtags} onChange={e => setDrafts(drafts.map(it => it.uid===d.uid?{...it, formData:{...it.formData, hashtags: e.target.value}}:it))} className="flex-1 text-xs font-black bg-pink-50 text-pink-500 p-5 rounded-2xl outline-none shadow-inner" /><div className="bg-black text-white px-6 py-5 rounded-2xl text-xs font-black flex items-center uppercase tracking-widest shadow-lg">SIZE: M</div></div>
                      </div>
                    ))}
                    <button onClick={handleSaveAllDrafts} className="w-full bg-black text-white py-7 rounded-[32px] font-black text-2xl shadow-2xl active:scale-95 transition-all">確認儲存更新至雲端 🚀</button>
                  </div>
                 )}
              </div>
            )}

            {activeTab === 'export' && (
              <div className="max-w-md mx-auto py-10 bg-white p-20 rounded-[64px] shadow-sm text-center border">
                 <div className="text-8xl mb-12">📊</div>
                 <h2 className="text-3xl font-black mb-16 tracking-tight">全庫存匯出系統</h2>
                 <button onClick={() => {
                    const content = ['編號,名稱,甲型,描述,標籤,XS,S,M,L', ...inventory.map(i => [i.id, i.name, i.shape, i.description?.replace(/,/g,' '), i.hashtags, i.stock.XS, i.stock.S, i.stock.M, i.stock.L].join(','))].join('\n');
                    const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `Inventory.csv`; link.click();
                 }} className="bg-black text-white py-6 rounded-[28px] font-black w-full shadow-2xl active:scale-95 transition-all">⬇️ 下載 CSV 檔案</button>
              </div>
            )}
          </main>

          {/* ✏️ 商品編輯窗 */}
          {editingItem && (
            <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-xl flex items-center justify-center p-4">
               <div className="bg-white rounded-[60px] p-10 w-full max-w-2xl max-h-[92vh] overflow-y-auto hide-scrollbar animate-fade-in-up shadow-2xl">
                  <div className="flex justify-between items-center mb-10 border-b pb-6"><h2 className="font-black text-3xl tracking-tight">編輯款式詳情</h2><button onClick={() => setEditingItem(null)} className="p-4 bg-slate-50 rounded-full hover:bg-slate-100 transition-colors text-black text-2xl font-black">✕</button></div>
                  <div className="space-y-10 text-left">
                     <div>
                        <div className="flex justify-between items-end mb-5 font-black"><label className="text-[11px] font-black text-gray-400 uppercase tracking-widest block">媒體內容管理</label><button onClick={() => editFileInputRef.current.click()} className="text-[11px] bg-black text-white px-6 py-2.5 rounded-full font-black shadow-lg">＋ 增加相片</button></div>
                        <div className="grid grid-cols-4 gap-4">
                           {editingItem.media?.map((m, i) => (
                             <div key={m.id} className="aspect-[3/4] relative rounded-3xl overflow-hidden border border-slate-100 bg-slate-50 shadow-inner">
                               <img src={m.url} className="w-full h-full object-cover" />
                               <button onClick={() => setEditingItem({...editingItem, media: editingItem.media.filter((_, idx)=>idx!==i)})} className="delete-btn">✕</button>
                             </div>
                           ))}
                        </div>
                     </div>
                     <div className="grid grid-cols-2 gap-6">
                        <div><label className="block text-[11px] font-black text-gray-400 mb-2 uppercase">名稱</label><input value={editingItem.name} onChange={e => setEditingItem({...editingItem, name:e.target.value})} className="w-full p-5 bg-slate-50 rounded-3xl font-black text-lg outline-none border-none shadow-inner" /></div>
                        <div><label className="block text-[11px] font-black text-gray-400 mb-2 uppercase">甲型</label><select value={editingItem.shape} onChange={e => setEditingItem({...editingItem, shape:e.target.value})} className="w-full p-5 bg-slate-50 rounded-3xl font-black text-lg outline-none border-none shadow-inner">{NAIL_SHAPES.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                     </div>
                     <div><label className="block text-[11px] font-black text-gray-400 mb-2 uppercase">行銷文案</label><textarea value={editingItem.description} onChange={e => setEditingItem({...editingItem, description:e.target.value})} className="w-full p-6 bg-slate-50 rounded-3xl font-bold text-sm h-40 outline-none border-none shadow-inner leading-relaxed text-slate-700" /></div>
                     <div className="grid grid-cols-4 gap-4">
                        {['XS','S','M','L'].map(s => <div key={s} className="text-center font-black"><div className="text-[11px] font-black text-gray-400 mb-2 uppercase font-mono">{s}</div><input type="number" value={editingItem.stock[s]} onChange={e => setEditingItem({...editingItem, stock:{...editingItem.stock, [s]:parseInt(e.target.value)||0}})} className="w-full text-center border-none bg-slate-50 p-5 rounded-3xl font-black text-xl shadow-inner" /></div>)}
                     </div>
                     <div className="flex gap-5 pt-10 border-t border-gray-100">
                        <button onClick={async () => {if(window.confirm("確定刪除此款式？")) { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).delete(); setEditingItem(null); showToast("已永久移除"); }}} className="flex-1 bg-red-50 text-red-500 py-6 rounded-[30px] font-black btn-scale active:scale-95">刪除款式</button>
                        <button onClick={async () => { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).update(editingItem); setEditingItem(null); showToast("更新完成 💾"); }} className="flex-[2] bg-black text-white py-6 rounded-[30px] font-black text-xl shadow-2xl active:scale-95 transition-all">確認儲存</button>
                     </div>
                  </div>
               </div>
            </div>
          )}

          {/* 📊 盤點核對窗 */}
          {showCompareModal && (
             <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-xl flex items-center justify-center p-4">
                <div className="bg-white rounded-[50px] p-10 w-full max-w-xl max-h-[85vh] overflow-y-auto animate-fade-in-up shadow-2xl">
                   <div className="flex justify-between items-center mb-8 border-b pb-4"><h2 className="font-black text-2xl tracking-tighter">📋 盤點核對單</h2><button onClick={() => setShowCompareModal(false)} className="p-3 bg-gray-100 rounded-full">✕</button></div>
                   <div className="space-y-4 mb-10">
                      {generateDiffList().map((d,i) => (
                        <div key={i} className="flex justify-between items-center p-5 bg-gray-50 rounded-3xl border border-slate-100">
                           <div className="font-black text-lg">{d.name} <span className="text-[10px] text-pink-600 ml-1">({d.size})</span></div>
                           <div className="font-black text-sm text-gray-500">系統 {d.systemCount} → <span className="text-blue-600 text-xl font-black">{d.scannedCount}</span></div>
                        </div>
                      ))}
                   </div>
                   <button onClick={async () => {
                      const batch = db.batch();
                      for (const [id, sizes] of Object.entries(scanSession)) {
                        const item = inventory.find(i => i.id === id);
                        if(item) {
                           const newStock = { ...item.stock };
                           for (const [s, c] of Object.entries(sizes)) newStock[s] = c;
                           batch.update(db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(id), { stock: newStock });
                        }
                      }
                      await batch.commit(); setScanSession({}); setScanLogs([]); setShowCompareModal(false); showToast("雲端庫存更新成功！");
                   }} className="w-full bg-blue-600 text-white py-6 rounded-[30px] font-black text-xl shadow-2xl active:scale-95 transition-all">確認並覆蓋現有庫存 💾</button>
                </div>
             </div>
          )}

          {/* 📱 底部導覽列 */}
          <nav className="fixed bottom-0 left-0 right-0 glass-effect border-t border-slate-100 pb-safe z-40 flex justify-around items-end px-6 h-28">
            <button onClick={() => setActiveTab('inventory')} className={`flex-1 pb-6 pt-5 flex flex-col items-center gap-1.5 transition-all ${activeTab === 'inventory' ? 'text-slate-900 scale-110' : 'text-slate-300'}`}><span className="text-3xl font-black">📦</span><span className="text-[10px] font-black uppercase tracking-widest">Store</span></button>
            <button onClick={() => setActiveTab('scan')} className={`flex-1 pb-6 pt-5 flex flex-col items-center gap-1.5 transition-all ${activeTab === 'scan' ? 'text-slate-900 scale-110' : 'text-slate-300'}`}><span className="text-3xl font-black">🔍</span><span className="text-[10px] font-black uppercase tracking-widest">Scan</span></button>
            <button onClick={() => setActiveTab('upload')} className="relative flex flex-col items-center justify-center -top-10 w-24"><div className={`w-20 h-20 rounded-[32px] flex items-center justify-center text-white shadow-2xl transition-all ${activeTab === 'upload' ? 'bg-pink-500 scale-110' : 'bg-slate-900'}`}><span className="text-5xl font-light">＋</span></div><span className={`text-[10px] font-black mt-4 uppercase tracking-widest ${activeTab === 'upload' ? 'text-pink-500' : 'text-slate-400'}`}>Add</span></button>
            <button onClick={() => setActiveTab('export')} className={`flex-1 pb-6 pt-5 flex flex-col items-center gap-1.5 transition-all ${activeTab === 'export' ? 'text-slate-900 scale-110' : 'text-slate-300'}`}><span className="text-3xl font-black">📊</span><span className="text-[10px] font-black uppercase tracking-widest">CSV</span></button>
          </nav>

          <input type="file" multiple ref={editFileInputRef} onChange={async (e) => {
             const files = e.target.files; if(!files.length) return;
             const newMedia = await Promise.all(Array.from(files).map(async f => ({ id: Math.random().toString(36).substr(2,9), url: await compressImage(f), type: 'image' })));
             setEditingItem(prev => ({ ...prev, media: [...(prev.media||[]), ...newMedia] }));
             e.target.value = '';
          }} className="hidden" />
          <input type="file" accept="image/*" capture="environment" ref={cameraInputRef} onChange={handleBatchCreationUpload} className="hidden" />
          <input type="file" accept="image/*" ref={galleryInputRef} onChange={handleBatchCreationUpload} className="hidden" />
          <input type="file" accept="image/*" capture="environment" ref={scanCameraRef} onChange={handleBatchScanUpload} className="hidden" />
          <input type="file" accept="image/*" ref={scanGalleryRef} onChange={handleBatchScanUpload} className="hidden" />
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

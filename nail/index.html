<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>雲端智能建檔系統 - 穩定版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  
  <!-- PapaParse for CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-[#F8F9FA] text-gray-800 font-sans selection:bg-blue-100">
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyDQZGeeubB8bEUL59v9yt0QBAfIWJcvgnw",
      authDomain: "nailproject-40022.firebaseapp.com",
      projectId: "nailproject-40022",
      storageBucket: "nailproject-40022.firebasestorage.app",
      messagingSenderId: "1004628981925",
      appId: "1:1004628981925:web:db01ede0c09f4071d5754c"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'nail-inventory-app';

    const { useState, useRef, useEffect, useMemo } = React;

    const NAIL_SHAPES = ['短橢圓', '中橢圓', '長橢圓', '細狗尖', '杏仁甲', '短圓', '新中方', '短梯', '中梯', '長梯', '超長梯', '長水滴'];

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
      const bgColor = type === 'success' ? 'bg-gray-900' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
      return (
        <div className={`fixed bottom-24 md:bottom-10 left-1/2 transform -translate-x-1/2 w-[90%] md:w-auto max-w-sm ${bgColor} text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 z-[150] border border-white/10 animate-bounce-short text-center`}>
          <span className="font-bold text-sm tracking-wide">{message}</span>
        </div>
      );
    };

    const compressImage = (file, maxResolution = 800) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width, height } = img;
            if (width > height && width > maxResolution) { height *= maxResolution / width; width = maxResolution; } 
            else if (height > maxResolution) { width *= maxResolution / height; height = maxResolution; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    function App() {
      const [activeTab, setActiveTab] = useState('inventory');
      const [inventory, setInventory] = useState([]);
      const [toastMsg, setToastMsg] = useState(null);
      const [isLoadingDB, setIsLoadingDB] = useState(true);
      const [user, setUser] = useState(null);

      const [drafts, setDrafts] = useState([]); 
      const csvInputRef = useRef(null);
      const draftPhotoInputRef = useRef({}); 
      
      const [editingItem, setEditingItem] = useState(null);
      const editMediaRef = useRef(null);
      const [scanQuery, setScanQuery] = useState('');

      const showToast = (message, type = 'success') => setToastMsg({ message, type });

      // 自動產生 NAIL_xxxx 編號邏輯 - 確保不重複
      const getNextStandardId = (currentInventory, offset = 0) => {
        const nailIds = currentInventory
          .map(item => {
            const match = item.id?.match(/NAIL_(\d+)/);
            return match ? parseInt(match[1]) : 0;
          })
          .filter(id => !isNaN(id));
        
        const maxId = nailIds.length > 0 ? Math.max(...nailIds) : 0;
        const nextId = maxId + 1 + offset;
        return `NAIL_${nextId.toString().padStart(4, '0')}`;
      };

      // 監聽登入狀態
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((u) => {
          setUser(u);
          if (!u) setIsLoadingDB(false);
        });
        return () => unsubscribe();
      }, []);

      // 監聽資料庫 - 核心穩定點
      useEffect(() => {
        if (!user) { 
          setInventory([]);
          return; 
        }
        setIsLoadingDB(true);
        const inventoryRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory');
        
        const unsubscribeDB = inventoryRef.onSnapshot((snapshot) => {
          const dbData = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
          dbData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          setInventory(dbData);
          setIsLoadingDB(false);
        }, (err) => {
          console.error("Firestore Error:", err);
          showToast("資料讀取失敗，請檢查權限", "error");
          setIsLoadingDB(false);
        });
        return () => unsubscribeDB();
      }, [user]);

      // --- 手動建檔 ---
      const handleManualAdd = () => {
        const nextId = getNextStandardId(inventory, drafts.length);
        const newDraft = {
          uid: `manual-${Date.now()}`,
          formData: {
            id: nextId,
            name: '',
            price: 390,
            description: '',
            shape: '',
            hashtags: '',
            stock: { XS: 0, S: 0, M: 0, L: 0 },
            media: []
          }
        };
        setDrafts([...drafts, newDraft]);
      };

      // --- CSV 一鍵匯入：精準讀取欄位 ---
      const handleCsvImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        Papa.parse(file, {
          header: true, skipEmptyLines: true,
          complete: (results) => {
            const rows = results.data;
            if (rows.length === 0) { showToast("CSV 檔案為空", "error"); return; }
            
            let currentOffset = drafts.length;
            const newDrafts = rows.map((row, index) => {
              const nextId = getNextStandardId(inventory, currentOffset++);
              return {
                uid: `csv-${Date.now()}-${index}`,
                formData: {
                  id: nextId,
                  // 精確對應要求的欄位標題
                  name: row['款式名稱'] || row['名稱'] || '',
                  price: parseInt(row['價格']) || 390,
                  description: row['趨勢風格描述 (50字內)'] || row['描述'] || '',
                  shape: NAIL_SHAPES.includes(row['甲型']) ? row['甲型'] : '',
                  hashtags: row['流行熱搜標籤 (#)'] || row['標籤'] || '',
                  stock: {
                    XS: parseInt(row['XS']) || 0,
                    S: parseInt(row['S']) || 0,
                    M: parseInt(row['M']) || 0,
                    L: parseInt(row['L']) || 0
                  },
                  media: []
                }
              };
            });
            setDrafts(prev => [...prev, ...newDrafts]);
            showToast(`成功匯入 ${newDrafts.length} 筆草稿`);
            e.target.value = '';
          }
        });
      };

      // --- 處理草稿的照片選擇 ---
      const handleDraftPhotoSelect = async (uid, e) => {
        const files = e.target.files; if (!files.length) return;
        showToast("圖片處理中...", "info");
        const newMedia = await Promise.all(Array.from(files).map(async (f) => {
          const url = await compressImage(f, 800);
          return { id: Math.random().toString(36).substr(2, 9), url, type: 'image' };
        }));
        setDrafts(drafts.map(d => d.uid === uid ? { ...d, formData: { ...d.formData, media: [...d.formData.media, ...newMedia] } } : d));
        e.target.value = '';
      };

      const updateDraft = (uid, field, value) => { 
        setDrafts(drafts.map(d => d.uid !== uid ? d : { ...d, formData: { ...d.formData, [field]: value } })); 
      };
      
      const handleSaveDrafts = async () => {
        if (!user) return showToast("請先登入", "error");
        if (drafts.length === 0) return;
        
        try {
          const batch = db.batch();
          for (const draft of drafts) {
            const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(draft.formData.id);
            batch.set(docRef, { 
              ...draft.formData, 
              createdAt: new Date().toISOString() 
            });
          }
          await batch.commit();
          setDrafts([]); 
          setActiveTab('inventory');
          showToast('雲端同步成功！');
        } catch (e) { showToast('同步失敗，請重試', 'error'); }
      };

      // --- 快速盤點邏輯 ---
      const updateStockCount = async (itemId, size, delta) => {
        const item = inventory.find(i => i.id === itemId);
        if (!item) return;
        const newStock = { ...item.stock, [size]: Math.max(0, (item.stock[size] || 0) + delta) };
        try {
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(itemId).update({ stock: newStock });
        } catch (e) { showToast("修改失敗", "error"); }
      };

      const filteredInventory = inventory.filter(i => 
        (i.id || '').toLowerCase().includes(scanQuery.toLowerCase()) || 
        (i.name || '').toLowerCase().includes(scanQuery.toLowerCase())
      );

      // --- 編輯功能：批次照片管理 ---
      const handleEditMediaUpload = async (e) => {
        const files = e.target.files; if (!files.length) return;
        showToast("照片處理中...", "info");
        const newMediaPromises = Array.from(files).map(async (file) => {
          const url = await compressImage(file, 800);
          return { id: Math.random().toString(36).substr(2, 9), type: 'image', url };
        });
        const newMediaList = await Promise.all(newMediaPromises);
        setEditingItem(prev => ({ ...prev, media: [...(prev.media || []), ...newMediaList] }));
        e.target.value = '';
      };

      return (
        <div className="min-h-screen bg-[#F8F9FA] pb-24 text-gray-800">
          {toastMsg && <Toast message={toastMsg.message} type={toastMsg.type} onClose={() => setToastMsg(null)} />}
          
          <header className="bg-white/95 backdrop-blur-md border-b sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm">
            <div className="flex items-center gap-3">
              <span className="text-2xl bg-gray-900 text-white w-10 h-10 flex items-center justify-center rounded-xl shadow-lg">💅</span>
              <h1 className="text-lg font-black tracking-tight">雲端智能建檔系統</h1>
            </div>
            {user ? (
              <div className="flex items-center gap-4">
                <div className="hidden md:flex flex-col items-end">
                  <span className="text-[10px] font-black text-gray-400 uppercase">Administrator</span>
                  <span className="text-xs font-bold text-gray-900">{user.displayName || '使用者'}</span>
                </div>
                <button onClick={() => auth.signOut()} className="text-[10px] bg-red-50 px-4 py-2 rounded-full font-black text-red-500 hover:bg-red-500 hover:text-white transition-all">登出</button>
              </div>
            ) : (
               <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="text-xs bg-gray-900 text-white px-5 py-2.5 rounded-xl font-black shadow-md">Google 登入</button>
            )}
          </header>

          {!user ? (
            <div className="flex flex-col items-center justify-center pt-32 px-6">
              <div className="bg-white p-12 rounded-[3rem] shadow-2xl text-center w-full max-w-sm border border-gray-100">
                <div className="text-7xl mb-6">📂</div>
                <h2 className="text-2xl font-black mb-2 text-gray-900">歡迎進入管理系統</h2>
                <p className="text-gray-400 text-sm mb-10 font-bold">請先登入以同步雲端資料庫</p>
                <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full bg-gray-900 text-white py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-all">🌐 使用 Google 帳號登入</button>
              </div>
            </div>
          ) : (
            <main className="max-w-6xl mx-auto px-6 pt-8">
              {/* 功能切換 */}
              <div className="flex gap-2 mb-10 bg-white p-1.5 rounded-2xl shadow-sm border border-gray-100 max-w-lg mx-auto">
                {['inventory', 'scan', 'upload'].map(tab => (
                  <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${activeTab === tab ? 'bg-gray-900 text-white shadow-lg' : 'text-gray-400 hover:text-gray-600'}`}>
                    {tab === 'inventory' ? '📦 款式庫' : tab === 'scan' ? '🔍 盤點' : '➕ 建檔'}
                  </button>
                ))}
              </div>

              {/* 款式總覽 */}
              {activeTab === 'inventory' && (
                <div>
                  {isLoadingDB ? (
                    <div className="flex flex-col items-center py-20 animate-pulse">
                      <div className="text-4xl mb-4">⌛</div>
                      <p className="font-black text-gray-300">正在獲取雲端庫存資料...</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                      {inventory.map(item => (
                        <div key={item.id} onClick={() => setEditingItem(item)} className="group bg-white rounded-[2rem] overflow-hidden shadow-sm border border-gray-100 cursor-pointer hover:shadow-2xl transition-all duration-300">
                          <div className="aspect-[4/5] bg-gray-50 relative overflow-hidden">
                            {item.media?.[0] ? (
                              <img src={item.media[0].url} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                            ) : (
                              <div className="w-full h-full flex items-center justify-center text-gray-300 text-[10px] font-black">無照片</div>
                            )}
                            <div className="absolute top-3 left-3 flex flex-col gap-1">
                              <span className="bg-white/90 backdrop-blur-md px-2 py-1 rounded-lg text-[9px] font-black shadow-sm">{item.id}</span>
                              {item.shape && <span className="bg-blue-600 text-white px-2 py-1 rounded-lg text-[9px] font-black shadow-sm">{item.shape}</span>}
                            </div>
                          </div>
                          <div className="p-4">
                            <h3 className="font-black text-sm truncate mb-1">{item.name || '未命名'}</h3>
                            <p className="text-[10px] text-gray-400 font-bold mb-3 line-clamp-1">{item.description || '無描述內容'}</p>
                            <div className="flex gap-1">
                              {['XS', 'S', 'M', 'L'].map(s => (
                                <div key={s} className={`flex-1 text-[9px] font-black text-center py-1 rounded-md ${item.stock[s] > 0 ? 'bg-blue-50 text-blue-600' : 'bg-gray-50 text-gray-300'}`}>
                                  {s}:{item.stock[s]}
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      ))}
                      {inventory.length === 0 && !isLoadingDB && (
                        <div className="col-span-full py-32 text-center bg-white rounded-[3rem] border-2 border-dashed border-gray-100">
                          <div className="text-5xl mb-4 text-gray-200">📭</div>
                          <p className="font-black text-gray-300">目前庫存是空的，請前往「建檔」功能新增</p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* 快速盤點 */}
              {activeTab === 'scan' && (
                <div className="max-w-2xl mx-auto space-y-4">
                  <div className="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 flex items-center px-4">
                    <span className="text-gray-300 mr-3">🔍</span>
                    <input type="text" placeholder="輸入編號或名稱搜尋..." value={scanQuery} onChange={e => setScanQuery(e.target.value)} className="w-full py-4 outline-none font-bold text-sm" />
                  </div>
                  <div className="space-y-3">
                    {filteredInventory.map(item => (
                      <div key={item.id} className="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-4">
                        <div className="w-16 h-16 bg-gray-50 rounded-2xl overflow-hidden flex-shrink-0 border">
                          {item.media?.[0] ? <img src={item.media[0].url} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-[10px] text-gray-300">無圖</div>}
                        </div>
                        <div className="flex-1 min-w-0">
                          <h4 className="font-black text-sm truncate">{item.name || '未命名'}</h4>
                          <p className="text-[10px] text-blue-500 font-black">{item.id} · {item.shape || '未設甲型'}</p>
                        </div>
                        <div className="grid grid-cols-4 gap-2">
                          {['XS', 'S', 'M', 'L'].map(s => (
                            <div key={s} className="flex flex-col items-center">
                              <span className="text-[9px] font-black text-gray-300 mb-1">{s}</span>
                              <div className="flex items-center bg-gray-50 rounded-xl overflow-hidden border border-gray-100">
                                <button onClick={() => updateStockCount(item.id, s, -1)} className="px-2 py-1 text-xs font-bold hover:bg-gray-200">-</button>
                                <span className="px-1 text-[11px] font-black min-w-[24px] text-center">{item.stock[s]}</span>
                                <button onClick={() => updateStockCount(item.id, s, 1)} className="px-2 py-1 text-xs font-bold hover:bg-gray-200">+</button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* 建立新款 */}
              {activeTab === 'upload' && (
                <div className="space-y-8">
                  {drafts.length === 0 ? (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                      <button onClick={handleManualAdd} className="bg-white p-12 rounded-[3rem] shadow-sm border-2 border-dashed border-gray-100 flex flex-col items-center hover:bg-gray-50 hover:border-blue-200 transition-all group">
                        <div className="w-20 h-20 bg-gray-900 text-white rounded-2xl flex items-center justify-center text-4xl mb-6 group-hover:scale-110 transition-transform shadow-xl">✍️</div>
                        <span className="font-black text-xl text-gray-900">手動快速建檔</span>
                        <p className="text-gray-400 text-xs font-bold mt-2">適用於建立單一或少量新品</p>
                      </button>
                      
                      <button onClick={() => csvInputRef.current.click()} className="bg-white p-12 rounded-[3rem] shadow-sm border-2 border-dashed border-gray-100 flex flex-col items-center hover:bg-gray-50 hover:border-blue-200 transition-all group">
                        <div className="w-20 h-20 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-4xl mb-6 group-hover:scale-110 transition-transform shadow-xl">📄</div>
                        <span className="font-black text-xl text-gray-900">CSV 一鍵匯入</span>
                        <p className="text-gray-400 text-xs font-bold mt-2">精準對應款式、描述、甲型、標籤</p>
                        <input type="file" accept=".csv" ref={csvInputRef} onChange={handleCsvImport} className="hidden" />
                      </button>
                    </div>
                  ) : (
                    <div className="space-y-6">
                      <div className="flex flex-col md:flex-row justify-between items-center bg-gray-900 text-white p-8 rounded-[2.5rem] shadow-2xl gap-4">
                        <div>
                          <h2 className="font-black text-xl mb-1">📋 待確認建檔清單 ({drafts.length})</h2>
                          <p className="text-xs text-gray-400 font-bold italic">請確認資訊無誤並新增照片，最後點擊底部按鈕完成同步</p>
                        </div>
                        <button onClick={() => setDrafts([])} className="bg-white/10 hover:bg-red-500 hover:text-white px-6 py-2 rounded-xl text-xs font-black transition-all">放棄所有草稿</button>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {drafts.map(d => (
                          <div key={d.uid} className="bg-white p-8 rounded-[3rem] shadow-sm border border-gray-100 space-y-6">
                            <div className="flex justify-between items-center">
                              <span className="text-[10px] font-black bg-blue-50 text-blue-600 px-4 py-2 rounded-full border border-blue-100">AUTO-ID: {d.formData.id}</span>
                              <button onClick={() => setDrafts(drafts.filter(dr => dr.uid !== d.uid))} className="text-gray-300 hover:text-red-500 transition-colors">✕</button>
                            </div>
                            
                            {/* 照片管理區 */}
                            <div className="space-y-3">
                               <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest">款式照片 (可多選)</label>
                               <div className="flex flex-wrap gap-3">
                                  {d.formData.media.map(m => (
                                    <div key={m.id} className="w-20 h-20 rounded-2xl overflow-hidden relative group border">
                                      <img src={m.url} className="w-full h-full object-cover" />
                                      <button onClick={() => updateDraft(d.uid, 'media', d.formData.media.filter(img => img.id !== m.id))} className="absolute inset-0 bg-red-500/80 text-white opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-xs font-black">刪除</button>
                                    </div>
                                  ))}
                                  <button onClick={() => draftPhotoInputRef.current[d.uid].click()} className="w-20 h-20 rounded-2xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center text-gray-300 hover:bg-blue-50 hover:border-blue-200 transition-all">
                                    <span className="text-2xl">+</span>
                                    <span className="text-[8px] font-black">新增</span>
                                  </button>
                                  <input type="file" multiple accept="image/*" ref={el => draftPhotoInputRef.current[d.uid] = el} onChange={(e) => handleDraftPhotoSelect(d.uid, e)} className="hidden" />
                               </div>
                            </div>

                            <div className="space-y-4">
                              <div>
                                <label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest">款式名稱</label>
                                <input type="text" placeholder="輸入名稱..." value={d.formData.name} onChange={e => updateDraft(d.uid, 'name', e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl font-black outline-none border border-transparent focus:border-blue-100 text-sm" />
                              </div>
                              
                              <div>
                                <label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest">趨勢風格描述 (50字內)</label>
                                <textarea placeholder="描述產品特色..." value={d.formData.description} onChange={e => updateDraft(d.uid, 'description', e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl text-xs font-bold h-24 outline-none resize-none" />
                              </div>
                              
                              <div className="grid grid-cols-2 gap-4">
                                <div>
                                  <label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest">甲型</label>
                                  <select value={d.formData.shape} onChange={e => updateDraft(d.uid, 'shape', e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl text-xs font-black outline-none border border-transparent focus:border-blue-100 appearance-none cursor-pointer">
                                    <option value="">選擇甲型</option>
                                    {NAIL_SHAPES.map(s => <option key={s} value={s}>{s}</option>)}
                                  </select>
                                </div>
                                <div>
                                  <label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest">流行熱搜標籤 (#)</label>
                                  <input type="text" placeholder="#風格" value={d.formData.hashtags} onChange={e => updateDraft(d.uid, 'hashtags', e.target.value)} className="w-full bg-gray-50 p-4 rounded-2xl text-xs font-black outline-none" />
                                </div>
                              </div>

                              <div>
                                <label className="block text-[10px] font-black text-gray-300 mb-3 tracking-widest uppercase">初始庫存設定</label>
                                <div className="grid grid-cols-4 gap-3">
                                  {['XS', 'S', 'M', 'L'].map(s => (
                                    <div key={s}>
                                      <div className="text-[10px] text-center font-black text-gray-300 mb-1">{s}</div>
                                      <input type="number" value={d.formData.stock[s]} onChange={e => updateDraft(d.uid, 'stock', {...d.formData.stock, [s]: parseInt(e.target.value) || 0})} className="w-full text-center bg-gray-50 py-3 rounded-xl font-black text-sm border border-transparent focus:border-blue-100" />
                                    </div>
                                  ))}
                                </div>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                      
                      <button onClick={handleSaveDrafts} className="w-full bg-blue-600 text-white py-7 rounded-[3rem] font-black text-xl shadow-2xl hover:bg-blue-700 active:scale-95 transition-all">
                        🚀 同步至雲端資料庫
                      </button>
                    </div>
                  )}
                </div>
              )}
            </main>
          )}

          {/* 編輯視窗 */}
          {editingItem && (
            <div className="fixed inset-0 z-[100] bg-black/70 backdrop-blur-md flex items-center justify-center p-4 overflow-y-auto">
              <div className="bg-white w-full max-w-xl rounded-[3rem] shadow-2xl animate-scale-in my-auto">
                <div className="p-8 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-10 rounded-t-[3rem]">
                  <div>
                    <h2 className="text-2xl font-black text-gray-900">修改款式詳情</h2>
                    <p className="text-gray-400 font-bold text-[10px] uppercase">Database ID: {editingItem.id}</p>
                  </div>
                  <button onClick={() => setEditingItem(null)} className="text-3xl text-gray-300 hover:text-gray-900 transition-colors">✕</button>
                </div>
                
                <div className="p-8 space-y-8">
                   <div className="space-y-4">
                      <div className="flex justify-between items-center">
                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest">款式媒體庫 (照片管理)</label>
                        <button onClick={() => editMediaRef.current.click()} className="text-[10px] font-black bg-gray-900 text-white px-4 py-2 rounded-xl hover:bg-black">+ 新增照片</button>
                        <input type="file" multiple accept="image/*" ref={editMediaRef} onChange={handleEditMediaUpload} className="hidden" />
                      </div>
                      <div className="grid grid-cols-4 gap-3">
                         {(editingItem.media || []).map((m, idx) => (
                           <div key={m.id} className="aspect-square rounded-2xl overflow-hidden relative group border bg-gray-50">
                             <img src={m.url} className="w-full h-full object-cover" />
                             <button onClick={() => setEditingItem({...editingItem, media: editingItem.media.filter((_, i) => i !== idx)})} className="absolute inset-0 bg-red-500/80 text-white opacity-0 group-hover:opacity-100 flex items-center justify-center text-xs font-black transition-opacity">刪除</button>
                           </div>
                         ))}
                         {(!editingItem.media || editingItem.media.length === 0) && (
                           <div className="col-span-4 py-10 text-center border-2 border-dashed border-gray-100 rounded-[2rem] text-gray-300 text-[10px] font-black">目前尚未上傳照片</div>
                         )}
                      </div>
                   </div>

                   <div className="space-y-5">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-[10px] font-black text-gray-400 mb-1">款式名稱</label>
                          <input type="text" value={editingItem.name} onChange={e => setEditingItem({...editingItem, name: e.target.value})} className="w-full bg-gray-50 p-4 rounded-2xl font-black outline-none border border-transparent focus:border-blue-100" />
                        </div>
                        <div>
                          <label className="block text-[10px] font-black text-gray-400 mb-1">甲型</label>
                          <select value={editingItem.shape} onChange={e => setEditingItem({...editingItem, shape: e.target.value})} className="w-full bg-blue-50 p-4 rounded-2xl text-xs font-black text-blue-700 outline-none">
                            <option value="">選擇甲型</option>
                            {NAIL_SHAPES.map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                        </div>
                      </div>
                      
                      <div>
                        <label className="block text-[10px] font-black text-gray-400 mb-1">趨勢風格描述</label>
                        <textarea value={editingItem.description} onChange={e => setEditingItem({...editingItem, description: e.target.value})} className="w-full bg-gray-50 p-4 rounded-2xl text-xs font-bold h-24 outline-none resize-none" />
                      </div>

                      <div>
                        <label className="block text-[10px] font-black text-gray-400 mb-1">熱搜標籤 (#)</label>
                        <input type="text" value={editingItem.hashtags} onChange={e => setEditingItem({...editingItem, hashtags: e.target.value})} className="w-full bg-gray-50 p-4 rounded-2xl text-xs font-black outline-none" />
                      </div>
                   </div>

                   <div className="bg-gray-50 p-6 rounded-[2rem] space-y-4">
                      <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest">即時庫存盤點</label>
                      <div className="grid grid-cols-4 gap-4">
                         {['XS', 'S', 'M', 'L'].map(s => (
                           <div key={s} className="bg-white p-3 rounded-2xl text-center shadow-sm border border-gray-100">
                             <div className="text-[10px] font-black text-gray-300 mb-1">{s}</div>
                             <input type="number" value={editingItem.stock[s]} onChange={e => setEditingItem({...editingItem, stock: {...editingItem.stock, [s]: parseInt(e.target.value) || 0}})} className="w-full text-center bg-transparent font-black text-gray-900 outline-none" />
                           </div>
                         ))}
                      </div>
                   </div>

                   <div className="flex gap-4 pt-4">
                      <button onClick={async () => { if(confirm('確定要永久刪除此款式嗎？')) { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).delete(); setEditingItem(null); showToast('已成功刪除'); } }} className="flex-1 bg-red-50 text-red-500 py-4 rounded-2xl font-black text-sm hover:bg-red-500 hover:text-white transition-all">🗑️ 刪除</button>
                      <button onClick={async () => { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).update(editingItem); setEditingItem(null); showToast('已儲存變更'); }} className="flex-[2] bg-gray-900 text-white py-4 rounded-2xl font-black shadow-2xl hover:bg-black transition-all active:scale-95">💾 儲存並關閉</button>
                   </div>
                </div>
              </div>
            </div>
          )}

          {/* 底部導覽 (手機版) */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 flex justify-around items-center h-20 md:hidden px-4 z-40 pb-safe shadow-2xl">
             <button onClick={() => setActiveTab('inventory')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'inventory' ? 'text-gray-900' : 'text-gray-300'}`}>
                <span className="text-2xl">📦</span><span className="text-[9px] font-black">款式庫</span>
             </button>
             <button onClick={() => setActiveTab('scan')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'scan' ? 'text-gray-900' : 'text-gray-300'}`}>
                <span className="text-2xl">🔍</span><span className="text-[9px] font-black">盤點</span>
             </button>
             <button onClick={() => setActiveTab('upload')} className={`w-14 h-14 rounded-full flex items-center justify-center text-2xl -top-6 relative shadow-2xl transition-all ${activeTab === 'upload' ? 'bg-blue-600 text-white rotate-45' : 'bg-gray-900 text-white'}`}>+</button>
             <button onClick={() => showToast('分析報表功能開發中', 'info')} className="flex flex-col items-center gap-1 text-gray-300">
                <span className="text-2xl">📊</span><span className="text-[9px] font-black">報表</span>
             </button>
             <button onClick={() => setActiveTab('inventory')} className="flex flex-col items-center gap-1 text-gray-300">
                <span className="text-2xl">👤</span><span className="text-[9px] font-black">我的</span>
             </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-scale-in { animation: scale-in 0.3s ease-out forwards; }
    @keyframes bounce-short { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
    .animate-bounce-short { animation: bounce-short 0.5s ease-out; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    /* 移除數字輸入框箭頭 */
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</body>
</html>

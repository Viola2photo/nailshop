<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MyNail 雲端管理中心</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <!-- 加入 CSV 解析套件 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    @supports (padding-bottom: env(safe-area-bottom)) { .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.8rem); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    body { background: #F8FAFC; color: #1E293B; font-family: "Microsoft JhengHei", sans-serif; font-weight: 900; -webkit-tap-highlight-color: transparent; }
    .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #F1F5F9; }
    .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
    input, textarea, select { font-weight: 900 !important; outline: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .btn-active:active { transform: scale(0.9); }
  </style>
</head>
<body class="selection:bg-pink-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    // --- Firebase 設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyDQZGeeubB8bEUL59v9yt0QBAfIWJcvgnw",
      authDomain: "nailproject-40022.firebaseapp.com",
      projectId: "nailproject-40022",
      storageBucket: "nailproject-40022.firebasestorage.app",
      messagingSenderId: "1004628981925",
      appId: "1:1004628981925:web:db01ede0c09f4071d5754c"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'nail-inventory-app';

    const NAIL_SHAPES = ['超短梯', '短梯', '中梯', '長梯', '超長梯', '短橢圓', '中橢圓', '長橢圓', '細狗尖', '杏仁甲', '中杏仁', '長杏仁', '短圓', '新中方', '長水滴'];

    // --- SVG 圖示 ---
    const IconPlus = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 4v16m8-8H4" /></svg>;
    const IconBox = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>;
    const IconScan = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>;
    const IconExport = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>;
    const IconTable = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>;

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 3500); return () => clearTimeout(timer); }, [onClose]);
      const bgColor = type === 'success' ? '#0F172A' : '#EF4444';
      return (
        <div className="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-[200] text-white font-black animate-fade-in-up text-center" style={{backgroundColor: bgColor}}>
          <span className="text-sm w-full font-black">{message}</span>
        </div>
      );
    };

    const compressImage = (file, maxRes = 1024) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width: w, height: h } = img;
            if (w > maxRes) { h *= maxRes / w; w = maxRes; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    function App() {
      const [activeTab, setActiveTab] = useState('inventory');
      const [inventory, setInventory] = useState([]);
      const [user, setUser] = useState(null);
      const [toastMsg, setToastMsg] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [editingItem, setEditingItem] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [addMode, setAddMode] = useState('manual'); // manual, import

      // 建檔表單
      const [newItem, setNewItem] = useState({
        id: '', name: '', price: 390, shape: '短梯', description: '', hashtags: '',
        stock: { XS: 0, S: 0, M: 0, L: 0 }, media: []
      });

      // 匯出暫存
      const [importDrafts, setImportDrafts] = useState([]);

      const fileInputRef = useRef(null);
      const editMediaRef = useRef(null);
      const csvInputRef = useRef(null);
      const draftPhotoInputRef = useRef(null);
      const [activeDraftUid, setActiveDraftUid] = useState(null);

      const showToast = (message, type = 'success') => setToastMsg({ message, type });

      // 自動編號建議
      const nextSuggestedId = useMemo(() => {
        if (inventory.length === 0) return "1";
        const ids = inventory.map(i => parseInt(i.id)).filter(id => !isNaN(id));
        return ids.length > 0 ? (Math.max(...ids) + 1).toString() : (inventory.length + 1).toString();
      }, [inventory]);

      useEffect(() => {
        if (!newItem.id && activeTab === 'add' && addMode === 'manual') {
          setNewItem(prev => ({ ...prev, id: nextSuggestedId }));
        }
      }, [nextSuggestedId, activeTab, addMode]);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged((u) => { 
          setUser(u); 
          setIsLoading(false); 
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        const ref = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory');
        return ref.onSnapshot(snap => {
          const data = snap.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
          data.sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
          setInventory(data);
        });
      }, [user]);

      const handleImageUpload = async (e, target = 'new') => {
        const files = e.target.files;
        if (!files.length) return;
        showToast("處理相片中...");
        const processed = await Promise.all(Array.from(files).map(async f => ({
          id: Math.random().toString(36).substr(2,9),
          url: await compressImage(f),
          type: 'image'
        })));
        
        if (target === 'edit') {
          setEditingItem(prev => ({ ...prev, media: [...(prev.media || []), ...processed] }));
        } else if (target === 'new') {
          setNewItem(prev => ({ ...prev, media: [...prev.media, ...processed] }));
        } else {
          // target is a draft UID
          setImportDrafts(prev => prev.map(d => d.uid === target ? { ...d, media: [...(d.media || []), ...processed] } : d));
        }
        e.target.value = '';
      };

      const handleCSVImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            const parsed = results.data.map((row, idx) => ({
              uid: `import-${Date.now()}-${idx}`,
              id: row['編號'] || (parseInt(nextSuggestedId) + idx).toString(),
              name: row['款式名稱'] || '未命名款式',
              description: row['流行描述 (約 50 字)'] || '',
              hashtags: row['關鍵標籤'] || '',
              price: 390,
              shape: '短梯',
              stock: { XS: 0, S: 0, M: 0, L: 0 },
              media: []
            }));
            setImportDrafts(parsed);
            showToast(`成功匯入 ${parsed.length} 筆資料，請上傳照片`);
          }
        });
        e.target.value = '';
      };

      const saveNewItem = async () => {
        if (!newItem.name.trim()) return showToast("請輸入款式名稱", "error");
        if (newItem.media.length === 0) return showToast("請上傳至少一張照片", "error");
        
        try {
          const finalId = newItem.id || nextSuggestedId;
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(finalId).set({
            ...newItem, id: finalId, createdAt: new Date().toISOString()
          });
          setNewItem({ id: '', name: '', price: 390, shape: '短梯', description: '', hashtags: '', stock: { XS: 0, S: 0, M: 0, L: 0 }, media: [] });
          setActiveTab('inventory');
          showToast("新款式已成功建檔！");
        } catch (e) { showToast("儲存失敗", "error"); }
      };

      const saveImportDrafts = async () => {
        const validDrafts = importDrafts.filter(d => d.media.length > 0);
        if (validDrafts.length === 0) return showToast("請至少為一個款式上傳照片", "error");
        
        showToast(`正在存入 ${validDrafts.length} 個款式...`);
        const batch = db.batch();
        validDrafts.forEach(d => {
          const ref = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(d.id);
          const { uid, ...data } = d;
          batch.set(ref, { ...data, createdAt: new Date().toISOString() });
        });
        
        await batch.commit();
        setImportDrafts([]);
        setActiveTab('inventory');
        showToast("批次匯入成功！");
      };

      const updateQuickStock = async (item, size, delta) => {
        const newCount = Math.max(0, (item.stock[size] || 0) + delta);
        try {
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(item.id).update({
            [`stock.${size}`]: newCount
          });
        } catch (e) { showToast("更新失敗", "error"); }
      };

      const filteredInventory = useMemo(() => {
        return inventory.filter(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()));
      }, [inventory, searchTerm]);

      if (isLoading) return <div className="min-h-screen flex items-center justify-center font-black text-slate-300 text-xl">資料連線中...</div>;

      if (!user) return (
        <div className="min-h-screen flex items-center justify-center bg-slate-900 p-6">
          <div className="bg-white p-12 rounded-[50px] shadow-2xl text-center max-w-sm w-full animate-fade-in-up">
            <div className="text-7xl mb-8 font-black font-black">💅</div>
            <h1 className="text-2xl font-black mb-10 tracking-tight text-slate-800">美甲管理中心</h1>
            <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full bg-blue-600 text-white py-5 rounded-3xl font-black shadow-xl active:scale-95 transition-all text-lg">Google 登入</button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen pb-32">
          {toastMsg && <Toast message={toastMsg.message} type={toastMsg.type} onClose={() => setToastMsg(null)} />}
          
          <header className="glass-nav sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
            <h1 className="text-2xl font-black tracking-tighter text-slate-900 font-black">MyNail. <span className="text-blue-500 italic">Cloud</span></h1>
            <button onClick={() => auth.signOut()} className="text-[10px] font-black text-red-400 border border-red-50 px-4 py-1.5 rounded-full uppercase tracking-widest font-black">Logout</button>
          </header>

          <main className="max-w-5xl mx-auto p-6 animate-fade-in-up">
            
            {activeTab === 'inventory' && (
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5">
                {inventory.length === 0 ? (
                  <div className="col-span-full py-40 text-center space-y-4">
                    <div className="text-6xl opacity-20">📦</div>
                    <p className="text-slate-300 text-xl font-black">目前尚無庫存資料</p>
                    <button onClick={() => setActiveTab('add')} className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black shadow-lg">手動建檔</button>
                  </div>
                ) : inventory.map(item => (
                  <div key={item.id} onClick={() => setEditingItem(item)} className="bg-white rounded-[36px] p-3 border border-slate-50 shadow-sm hover:shadow-xl transition-all cursor-pointer group active:scale-95">
                    <div className="aspect-[4/5] rounded-[28px] overflow-hidden mb-3 bg-gray-50">
                      <img src={item.media?.[0]?.url} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                    </div>
                    <div className="px-2 mb-2">
                       <span className="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-black">#{item.id}</span>
                       <h3 className="font-black text-sm truncate mt-1">{item.name}</h3>
                    </div>
                    <div className="flex gap-1 px-1">
                      {['XS','S','M','L'].map(sz => (
                        <div key={sz} className={`flex-1 text-[9px] text-center rounded-lg py-1 font-black ${item.stock?.[sz]>0?'bg-slate-900 text-white':'bg-gray-100 text-slate-300'}`}>{item.stock?.[sz]||0}</div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'quickCheck' && (
              <div className="max-w-3xl mx-auto space-y-6">
                <div className="bg-white rounded-[35px] p-4 border border-slate-100 shadow-sm flex items-center gap-3">
                  <span className="text-slate-400 pl-2">🔍</span>
                  <input className="flex-1 bg-transparent py-2 font-black text-lg" placeholder="搜尋款式名稱..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                </div>
                <div className="space-y-4">
                  {filteredInventory.map(item => (
                    <div key={item.id} className="bg-white p-4 rounded-[35px] border border-slate-50 shadow-sm flex items-center gap-4">
                      <img src={item.media?.[0]?.url} className="w-16 h-20 rounded-2xl object-cover shadow-sm" />
                      <div className="flex-1 min-w-0">
                        <h4 className="font-black truncate mb-3"><span className="text-slate-300 mr-2 font-black">#{item.id}</span>{item.name}</h4>
                        <div className="grid grid-cols-4 gap-2">
                          {['XS','S','M','L'].map(sz => (
                            <div key={sz} className="flex flex-col items-center">
                              <span className="text-[9px] text-slate-400 mb-1 font-black">{sz}</span>
                              <div className="flex items-center gap-2 bg-slate-50 rounded-full px-2 py-1 font-black">
                                <button onClick={() => updateQuickStock(item, sz, -1)} className="w-5 h-5 flex items-center justify-center bg-white rounded-full shadow-sm text-red-500 font-black btn-active">-</button>
                                <span className="text-xs font-black min-w-[12px] text-center">{item.stock[sz]||0}</span>
                                <button onClick={() => updateQuickStock(item, sz, 1)} className="w-5 h-5 flex items-center justify-center bg-white rounded-full shadow-sm text-blue-500 font-black btn-active">+</button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'add' && (
              <div className="max-w-3xl mx-auto py-2 space-y-6">
                <div className="flex bg-gray-100 p-1 rounded-2xl">
                   <button onClick={() => setAddMode('manual')} className={`flex-1 py-3 rounded-xl font-black text-sm transition-all ${addMode==='manual'?'bg-white text-slate-900 shadow-sm':'text-slate-400'}`}>手動逐筆建檔</button>
                   <button onClick={() => setAddMode('import')} className={`flex-1 py-3 rounded-xl font-black text-sm transition-all ${addMode==='import'?'bg-white text-blue-600 shadow-sm':'text-slate-400'}`}>匯入試算表 (CSV)</button>
                </div>

                {addMode === 'manual' ? (
                  <div className="bg-white rounded-[50px] p-8 md:p-12 border border-slate-100 shadow-2xl space-y-10">
                    <h2 className="text-3xl font-black tracking-tight font-black">手動建檔</h2>
                    <div className="space-y-8">
                       <div>
                         <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 block">款式照片 (多選)</label>
                         <div className="grid grid-cols-4 gap-3">
                            {newItem.media.map((m, i) => (
                              <div key={i} className="aspect-square rounded-2xl overflow-hidden border relative group font-black">
                                 <img src={m.url} className="w-full h-full object-cover" />
                                 <button onClick={() => setNewItem({...newItem, media: newItem.media.filter((_, idx)=>idx!==i)})} className="absolute top-1 right-1 bg-red-500 text-white w-5 h-5 rounded-full text-[10px] font-black flex items-center justify-center shadow-lg font-black">✕</button>
                              </div>
                            ))}
                            <button onClick={() => fileInputRef.current.click()} className="aspect-square rounded-2xl border-2 border-dashed border-slate-200 flex items-center justify-center text-slate-300 hover:border-blue-400 transition-colors font-black"><IconPlus /></button>
                         </div>
                         <input type="file" multiple accept="image/*" ref={fileInputRef} onChange={(e) => handleImageUpload(e, 'new')} className="hidden" />
                       </div>

                       <div className="grid grid-cols-2 gap-5 text-slate-900 font-black">
                         <div className="col-span-1">
                            <label className="text-[11px] font-black text-slate-400 mb-2 block uppercase">款式編號</label>
                            <input value={newItem.id} onChange={e => setNewItem({...newItem, id:e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-black text-lg" placeholder={nextSuggestedId} />
                         </div>
                         <div className="col-span-1">
                            <label className="text-[11px] font-black text-slate-400 mb-2 block uppercase font-black font-black">建議售價</label>
                            <input type="number" value={newItem.price} onChange={e => setNewItem({...newItem, price:e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-black text-lg" />
                         </div>
                         <div className="col-span-2">
                            <label className="text-[11px] font-black text-slate-400 mb-2 block uppercase font-black">款式名稱</label>
                            <input value={newItem.name} onChange={e => setNewItem({...newItem, name:e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-black text-lg focus:bg-white focus:ring-2 focus:ring-blue-100 transition-all font-black font-black" placeholder="輸入名稱..." />
                         </div>
                         <div className="col-span-2">
                            <label className="text-[11px] font-black text-slate-400 mb-2 block uppercase font-black">款式簡短描述</label>
                            <textarea value={newItem.description} onChange={e => setNewItem({...newItem, description:e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-black h-24 no-scrollbar font-black" placeholder="輸入特色說明..." />
                         </div>
                         <div className="col-span-2">
                            <label className="text-[11px] font-black text-slate-400 mb-2 block uppercase font-black font-black">標籤 Hashtags</label>
                            <input value={newItem.hashtags} onChange={e => setNewItem({...newItem, hashtags:e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-black text-blue-500 font-black" placeholder="#優雅 #法式" />
                         </div>
                         <div className="col-span-2">
                            <label className="text-[11px] font-black text-slate-400 mb-2 block uppercase font-black font-black font-black">初始庫存量</label>
                            <div className="grid grid-cols-4 gap-3">
                               {['XS','S','M','L'].map(sz => (
                                 <div key={sz} className="text-center bg-slate-50 p-3 rounded-2xl font-black">
                                   <div className="text-[10px] text-slate-400 mb-1 font-black font-black">{sz}</div>
                                   <input type="number" value={newItem.stock[sz]} onChange={e => setNewItem({...newItem, stock:{...newItem.stock, [sz]:parseInt(e.target.value)||0}})} className="w-full text-center bg-transparent font-black text-lg font-black" />
                                 </div>
                               ))}
                            </div>
                         </div>
                       </div>
                    </div>
                    <button onClick={saveNewItem} className="w-full bg-slate-900 text-white py-6 rounded-[32px] font-black text-2xl shadow-xl active:scale-95 transition-all font-black">確認存入 🚀</button>
                  </div>
                ) : (
                  <div className="space-y-6 animate-fade-in-up font-black">
                     {importDrafts.length === 0 ? (
                       <div className="bg-white rounded-[50px] p-16 text-center border-2 border-dashed border-slate-200">
                          <div className="text-6xl mb-6 font-black"><IconTable /></div>
                          <h2 className="text-2xl font-black mb-4 font-black">匯入款式記錄</h2>
                          <p className="text-slate-400 text-sm mb-8 font-black">請選擇您的 CSV 檔案<br/>系統將自動讀取名稱與描述</p>
                          <button onClick={() => csvInputRef.current.click()} className="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg">選取 CSV 檔案</button>
                          <input type="file" accept=".csv" ref={csvInputRef} onChange={handleCSVImport} className="hidden" />
                       </div>
                     ) : (
                       <div className="space-y-4">
                          <div className="flex justify-between items-center bg-slate-900 text-white p-5 rounded-3xl shadow-lg">
                             <span className="font-black font-black font-black">待上傳清單 ({importDrafts.length})</span>
                             <button onClick={() => setImportDrafts([])} className="text-xs bg-white/20 px-3 py-1.5 rounded-lg font-black font-black font-black">取消匯入</button>
                          </div>
                          <div className="max-h-[50vh] overflow-y-auto space-y-3 no-scrollbar font-black">
                             {importDrafts.map(d => (
                               <div key={d.uid} className="bg-white p-4 rounded-3xl border border-slate-100 flex gap-4 items-center">
                                  <div onClick={() => { setActiveDraftUid(d.uid); draftPhotoInputRef.current.click(); }} className="w-20 h-20 rounded-2xl bg-slate-50 border-2 border-dashed border-slate-200 flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 transition-all overflow-hidden font-black">
                                     {d.media.length > 0 ? <img src={d.media[0].url} className="w-full h-full object-cover" /> : <div className="flex flex-col items-center"><span className="text-xs text-slate-400 font-black">照片</span><span className="text-blue-500 text-lg font-black">＋</span></div>}
                                  </div>
                                  <div className="flex-1 min-w-0 font-black">
                                     <div className="flex items-center gap-2 font-black"><span className="text-[10px] bg-slate-100 px-1 rounded font-black font-black font-black font-black">#{d.id}</span><h4 className="font-black truncate">{d.name}</h4></div>
                                     <p className="text-[10px] text-slate-400 line-clamp-2 mt-1 font-black font-black font-black">{d.description}</p>
                                  </div>
                               </div>
                             ))}
                          </div>
                          <input type="file" multiple accept="image/*" ref={draftPhotoInputRef} onChange={(e) => handleImageUpload(e, activeDraftUid)} className="hidden" />
                          <button onClick={saveImportDrafts} className="w-full bg-blue-600 text-white py-6 rounded-[32px] font-black text-2xl shadow-xl active:scale-95 transition-all font-black font-black font-black">一鍵存入資料庫 🚀</button>
                       </div>
                     )}
                  </div>
                )}
              </div>
            )}
          </main>

          {editingItem && (
            <div className="fixed inset-0 z-[100] bg-slate-900/90 backdrop-blur-xl flex items-center justify-center p-4 font-black font-black font-black">
               <div className="bg-white rounded-[60px] p-10 w-full max-w-3xl max-h-[90vh] overflow-y-auto no-scrollbar font-black text-slate-900 animate-fade-in-up">
                  <div className="flex justify-between items-center mb-10 border-b pb-6">
                    <h2 className="text-3xl font-black tracking-tight font-black font-black font-black font-black">編輯款式詳情</h2>
                    <button onClick={() => setEditingItem(null)} className="p-4 bg-slate-100 rounded-full font-black text-xl hover:bg-slate-200 transition-colors font-black">✕</button>
                  </div>
                  <div className="space-y-8 text-left font-black">
                     <div>
                        <div className="flex justify-between items-end mb-5">
                          <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest block font-black font-black font-black">媒體內容管理</label>
                          <button onClick={() => editMediaRef.current.click()} className="bg-slate-900 text-white text-[10px] px-6 py-2 rounded-full font-black shadow-lg font-black font-black">＋ 新增相片</button>
                        </div>
                        <input type="file" multiple accept="image/*" ref={editMediaRef} onChange={(e) => handleImageUpload(e, 'edit')} className="hidden font-black font-black font-black" />
                        <div className="grid grid-cols-4 gap-4 font-black font-black font-black font-black font-black">
                           {editingItem.media?.map((m, i) => (
                             <div key={m.id} className="aspect-square relative rounded-3xl overflow-hidden border">
                               <img src={m.url} className="w-full h-full object-cover font-black font-black font-black font-black" />
                               <button onClick={() => setEditingItem({...editingItem, media: editingItem.media.filter((_, idx)=>idx!==i)})} className="absolute top-2 right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs font-black shadow-lg flex items-center justify-center font-black">✕</button>
                             </div>
                           ))}
                        </div>
                     </div>
                     <div className="grid grid-cols-2 gap-8 text-slate-900">
                        <div className="col-span-1">
                           <label className="text-[11px] text-slate-400 mb-1 block uppercase font-black font-black">編號</label>
                           <input value={editingItem.id} disabled className="w-full p-5 bg-slate-50 rounded-3xl font-black border-none text-xl opacity-50" />
                        </div>
                        <div className="col-span-1">
                           <label className="text-[11px] text-slate-400 mb-1 block uppercase font-black font-black font-black">名稱</label>
                           <input value={editingItem.name} onChange={e => setEditingItem({...editingItem, name:e.target.value})} className="w-full p-5 bg-slate-50 rounded-3xl font-black border-none text-xl font-black font-black" />
                        </div>
                        <div className="col-span-2">
                           <label className="text-[11px] text-slate-400 mb-1 block uppercase font-black font-black font-black font-black">詳細描述</label>
                           <textarea value={editingItem.description} onChange={e => setEditingItem({...editingItem, description:e.target.value})} className="w-full p-5 bg-slate-50 rounded-3xl font-black h-32 no-scrollbar text-sm font-black font-black" />
                        </div>
                        <div className="grid grid-cols-4 gap-4 col-span-2 text-center font-black">
                           {['XS','S','M','L'].map(sz => (
                             <div key={sz}>
                               <div className="text-[10px] text-slate-400 mb-2 font-black font-black font-black font-black">{sz}</div>
                               <input type="number" value={editingItem.stock[sz]} onChange={e => setEditingItem({...editingItem, stock:{...editingItem.stock, [sz]:parseInt(e.target.value)||0}})} className="w-full text-center p-5 bg-slate-50 rounded-3xl font-black text-xl font-black font-black" />
                             </div>
                           ))}
                        </div>
                     </div>
                     <div className="flex gap-6 pt-10 border-t border-slate-50 font-black font-black font-black font-black">
                        <button onClick={async () => {if(window.confirm("確定永久刪除？")) { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).delete(); setEditingItem(null); showToast("已刪除"); }}} className="flex-1 bg-red-50 text-red-500 py-6 rounded-[35px] font-black text-xl hover:bg-red-100 transition-all font-black font-black font-black font-black">刪除款式</button>
                        <button onClick={async () => { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).update(editingItem); setEditingItem(null); showToast("修改已儲存 💾"); }} className="flex-[2] bg-slate-900 text-white py-6 rounded-[35px] font-black text-2xl shadow-2xl active:scale-95 transition-all font-black font-black font-black font-black font-black">確認儲存</button>
                     </div>
                  </div>
               </div>
            </div>
          )}

          {/* 📱 底部手機導覽列 */}
          <nav className="fixed bottom-0 left-0 right-0 glass-nav border-t border-slate-100 pb-safe z-40 flex justify-around items-end px-8 h-28">
            <button onClick={() => setActiveTab('inventory')} className={`flex-1 pb-6 pt-5 flex flex-col items-center gap-2 transition-all ${activeTab === 'inventory' ? 'text-slate-900 scale-110' : 'text-slate-300'}`}>
              <IconBox /><span className="text-[10px] font-black uppercase font-black font-black">庫存</span>
            </button>
            <button onClick={() => setActiveTab('quickCheck')} className={`flex-1 pb-6 pt-5 flex flex-col items-center gap-2 transition-all ${activeTab === 'quickCheck' ? 'text-slate-900 scale-110' : 'text-slate-300'}`}>
              <IconScan /><span className="text-[10px] font-black uppercase font-black font-black">快速對帳</span>
            </button>
            <button onClick={() => setActiveTab('add')} className="relative flex flex-col items-center justify-center -top-10 w-24">
              <div className={`w-20 h-20 rounded-[35px] flex items-center justify-center text-white shadow-2xl transition-all ${activeTab === 'add' ? 'bg-blue-600 scale-110 shadow-blue-200' : 'bg-slate-900 shadow-slate-200'}`}>
                <IconPlus />
              </div>
              <span className={`text-[10px] font-black mt-4 uppercase font-black font-black ${activeTab === 'add' ? 'text-blue-600' : 'text-slate-400'}`}>建檔</span>
            </button>
            <button onClick={() => {
                const headers = ['編號,名稱,甲型,描述,標籤,XS,S,M,L'];
                const content = [headers, ...inventory.map(i => [i.id, i.name, i.shape, (i.description||"").replace(/,/g,' '), i.hashtags, i.stock.XS, i.stock.S, i.stock.M, i.stock.L].join(','))].join('\n');
                const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `Shop_Inventory.csv`; link.click();
              }} className="flex-1 pb-6 pt-5 flex flex-col items-center gap-2 text-slate-300 active:text-slate-900">
              <IconExport /><span className="text-[10px] font-black uppercase font-black font-black">匯出</span>
            </button>
          </nav>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

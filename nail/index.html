<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>雲端智能建檔系統 (AI 診斷增強版)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-[#FDFDFD] text-gray-800 font-sans selection:bg-pink-100">
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyDQZGeeubB8bEUL59v9yt0QBAfIWJcvgnw",
      authDomain: "nailproject-40022.firebaseapp.com",
      projectId: "nailproject-40022",
      storageBucket: "nailproject-40022.firebasestorage.app",
      messagingSenderId: "1004628981925",
      appId: "1:1004628981925:web:db01ede0c09f4071d5754c"
    };

    // ✨ 您的 Gemini API Key (請確保 Google Cloud 已放行 Vercel 網域)
    const GEMINI_API_KEY = "AIzaSyDznYhxz5z7WNqQtyQa1DtLilqYwSncUq0"; 

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'nail-inventory-app';

    const { useState, useRef, useEffect, useMemo } = React;

    const NAIL_SHAPES = ['超短梯', '短梯', '中梯', '長梯', '超長梯', '短橢圓', '中橢圓', '長橢圓', '細狗尖', '杏仁甲', '中杏仁', '長杏仁', '短圓', '新中方', '長水滴'];
    const COPYWRITING_STYLES = ['隨機驚喜', '法式優雅名媛', '日系甜美純慾', '歐美個性暗黑', '極簡高階質感', '活潑可愛少女'];

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 5000); return () => clearTimeout(timer); }, [onClose]);
      const bgColor = type === 'success' ? 'bg-gray-900' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
      return (
        <div className={`fixed bottom-24 md:bottom-10 left-1/2 transform -translate-x-1/2 w-[90%] md:w-auto max-w-md ${bgColor} text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 z-[100] border border-white/10 animate-bounce`}>
          <span className="text-xl">{type === 'success' ? '✅' : '⚠️'}</span>
          <span className="font-bold text-sm tracking-wide">{message}</span>
        </div>
      );
    };

    const loadImage = (src) => new Promise((resolve) => {
      const img = new Image(); img.onload = () => resolve(img); img.src = src;
    });

    const cropImageFromBox = (imgElement, box) => {
      try {
        let [ymin, xmin, ymax, xmax] = box;
        if (xmax <= 1 && ymax <= 1) { ymin *= 1000; xmin *= 1000; ymax *= 1000; xmax *= 1000; }
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const sx = (xmin / 1000) * imgElement.naturalWidth;
        const sy = (ymin / 1000) * imgElement.naturalHeight;
        const sw = ((xmax - xmin) / 1000) * imgElement.naturalWidth;
        const sh = ((ymax - ymin) / 1000) * imgElement.naturalHeight;
        if(sw <= 0 || sh <= 0) return null;
        canvas.width = sw; canvas.height = sh;
        ctx.drawImage(imgElement, sx, sy, sw, sh, 0, 0, sw, sh);
        return canvas.toDataURL('image/jpeg', 0.9);
      } catch (e) { return null; }
    };

    const compressImage = (file, maxRes = 800) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width: w, height: h } = img;
            if (w > h && w > maxRes) { h *= maxRes / w; w = maxRes; } 
            else if (h > maxRes) { w *= maxRes / h; h = maxRes; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    function App() {
      const [activeTab, setActiveTab] = useState('inventory');
      const [inventory, setInventory] = useState([]);
      const [toastMsg, setToastMsg] = useState(null);
      const [user, setUser] = useState(null);
      const [isLoadingDB, setIsLoadingDB] = useState(true);

      const [isScanning, setIsScanning] = useState(false);
      const [drafts, setDrafts] = useState([]); 
      const [uploadStyle, setUploadStyle] = useState('隨機驚喜');
      
      const [isStockTaking, setIsStockTaking] = useState(false);
      const [scanSession, setScanSession] = useState({}); 
      const [unknownScans, setUnknownScans] = useState([]);
      const [showCompareModal, setShowCompareModal] = useState(false);
      const [editingItem, setEditingItem] = useState(null);

      const cameraInputRef = useRef(null);
      const galleryInputRef = useRef(null);
      const scanCameraRef = useRef(null);
      const scanGalleryRef = useRef(null);
      const editFileInputRef = useRef(null);

      const showToast = (message, type = 'success') => setToastMsg({ message, type });

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(setUser);
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) { setIsLoadingDB(false); return; }
        const inventoryRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory');
        const unsubDB = inventoryRef.onSnapshot((snapshot) => {
          const dbData = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
          dbData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          setInventory(dbData);
          setIsLoadingDB(false);
        });
        return () => unsubDB();
      }, [user]);

      const callGeminiAI = async (base64Data, promptText) => {
        try {
          // ⚠️ 改用 v1 版本且使用穩定模型
          const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
          const result = await fetch(url, {
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }, ...(base64Data ? [{ inlineData: { mimeType: "image/jpeg", data: base64Data } }] : []) ] }],
              systemInstruction: { parts: [{ text: "只輸出 JSON 物件，不要輸出任何額外文字。" }] },
              generationConfig: { responseMimeType: base64Data ? "application/json" : "text/plain" }
            })
          });
          
          const jsonRes = await result.json();
          
          if (jsonRes.error) {
             // 💡 這裡會彈出真正的錯誤原因
             throw new Error(`Google API 拒絕: ${jsonRes.error.message} (請檢查 Google Cloud 設定)`);
          }

          const text = jsonRes.candidates?.[0]?.content?.parts?.[0]?.text || '';
          if(!base64Data) return text; 
          
          const cleanJson = text.replace(/```json/g, '').replace(/```/g, '').trim();
          return JSON.parse(cleanJson);
        } catch(e) { 
          showToast(`AI 發生錯誤: ${e.message}`, "error"); 
          return base64Data ? { items: [] } : "";
        }
      };

      const handleRewriteDescription = async (isEditing, currentName, draftUid = null) => {
        showToast("AI 靈感湧現中...", "success");
        const prompt = `你是一個美甲文案專家。商品名為「${currentName}」。請撰寫一段約 30 字的生動穿戴甲商品描述，並附上3個標籤(#)。`;
        const newDesc = await callGeminiAI(null, prompt);
        if(newDesc) {
           if(isEditing) setEditingItem(prev => ({ ...prev, description: newDesc.trim() }));
           else if (draftUid) updateDraft(draftUid, 'description', newDesc.trim());
           showToast("✨ 風格切換成功！");
        }
      };

      const handleBatchScanUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return; e.target.value = ''; 
        setIsStockTaking(true);
        try {
          const base64DataUrl = await compressImage(file, 1600);
          const base64Data = base64DataUrl.split(',')[1];
          const prompt = `盤點照片中的每一副穿戴甲。對比：${JSON.stringify(inventory.map(i => ({ id: i.id, name: i.name })))}。回傳 JSON：{"knownItems": [{"matchedId": "ID", "detectedSize": "XS/S/M/L"}], "unknownItems": [{"box2d": [y,x,y,x], "suggestedName": "名", "detectedSize": "S"}]}`;
          const data = await callGeminiAI(base64Data, prompt);
          const knowns = data.knownItems || [];
          const unknowns = data.unknownItems || [];
          setScanSession(prev => {
            let newSession = { ...prev };
            knowns.forEach(res => {
              const item = inventory.find(i => i.id === res.matchedId);
              if (item) {
                const size = res.detectedSize || 'M';
                const count = (newSession[item.id] || {})[size] || 0;
                newSession[item.id] = { ...(newSession[item.id] || {}), [size]: count + 1 };
              }
            });
            return newSession;
          });
          if (unknowns.length > 0) {
            const imgEl = await loadImage(base64DataUrl);
            const processed = unknowns.map(u => ({ ...u, uid: Math.random(), croppedUrl: cropImageFromBox(imgEl, u.box2d) || base64DataUrl }));
            setUnknownScans(prev => [...prev, ...processed]);
          }
          showToast(`盤點完成！`);
        } catch (err) { } finally { setIsStockTaking(false); }
      };

      const handleBatchCreationUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return; e.target.value = '';
        setIsScanning(true); setDrafts([]);
        try {
          const aiUrl = await compressImage(file, 1600);
          const dbUrl = await compressImage(file, 800);
          const base64 = aiUrl.split(',')[1];
          const prompt = `辨識照片中的每一套穿戴甲。對比：${JSON.stringify(inventory.map(i => ({ id: i.id, name: i.name })))}。回傳 JSON：{"items": [{"matchedId": "ID", "detectedSize": "S", "styleName": "名", "description": "文案", "shape": "甲型", "hashtags": "#標籤"}]}`;
          const data = await callGeminiAI(base64, prompt);
          const items = data.items || [];
          if (items.length === 0) { showToast("AI 辨識無效或格式錯誤", "error"); return; }
          const newDrafts = items.map((item, i) => {
            const matchedItem = item.matchedId ? inventory.find(inv => inv.id === item.matchedId) : null;
            return {
              uid: `draft-${Date.now()}-${i}`, isMatch: !!matchedItem, matchedItem,
              mediaRaw: { url: dbUrl, extension: 'jpg', type: 'image' },
              formData: {
                id: matchedItem ? matchedItem.id : `NAIL-${Math.floor(Math.random()*10000).toString().padStart(4,'0')}`,
                name: matchedItem ? matchedItem.name : (item.styleName || '新商品'),
                price: matchedItem ? matchedItem.price : 390,
                description: matchedItem ? matchedItem.description : (item.description || ''),
                shape: matchedItem ? matchedItem.shape : (NAIL_SHAPES.includes(item.shape) ? item.shape : ''),
                hashtags: matchedItem ? matchedItem.hashtags : (item.hashtags || ''),
                detectedSize: item.detectedSize || 'M',
                stock: { XS: 0, S: 0, M: 0, L: 0, ...(item.detectedSize && !matchedItem ? { [item.detectedSize]: 1 } : {}) }
              }
            };
          });
          setDrafts(newDrafts);
        } catch (err) { } finally { setIsScanning(false); }
      };

      const updateDraft = (uid, field, val) => setDrafts(prev => prev.map(d => d.uid === uid ? { ...d, formData: { ...d.formData, [field]: val } } : d));
      const handleSaveAllDrafts = async () => {
        if (!user || drafts.length === 0) return;
        const batch = db.batch();
        for (const d of drafts) {
          const ref = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(d.formData.id);
          if (d.isMatch) {
            const newStock = { ...d.matchedItem.stock };
            newStock[d.formData.detectedSize] = (newStock[d.formData.detectedSize] || 0) + 1;
            batch.update(ref, { stock: newStock });
          } else {
            batch.set(ref, { ...d.formData, media: [{ ...d.mediaRaw, id: Date.now().toString() }], createdAt: new Date().toISOString() });
          }
        }
        await batch.commit(); setDrafts([]); setActiveTab('inventory'); showToast("儲存成功！");
      };

      if (!user) return (
        <div className="min-h-screen flex items-center justify-center bg-gray-50">
          <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="bg-white px-8 py-4 rounded-2xl shadow-xl font-bold border border-gray-100">🌐 登入後台系統</button>
        </div>
      );

      return (
        <div className="pb-24">
          {toastMsg && <Toast message={toastMsg.message} type={toastMsg.type} onClose={() => setToastMsg(null)} />}
          <input type="file" ref={cameraInputRef} onChange={handleBatchCreationUpload} className="hidden" />
          <input type="file" ref={scanCameraRef} onChange={handleBatchScanUpload} className="hidden" />

          <header className="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-20 px-4 py-3 flex justify-between items-center">
            <h1 className="font-black text-lg">☁️ 雲端智能建檔</h1>
            <nav className="flex gap-4">
              <button onClick={() => setActiveTab('inventory')} className={`font-bold text-sm ${activeTab==='inventory'?'text-blue-600':'text-gray-400'}`}>總覽</button>
              <button onClick={() => setActiveTab('scan')} className={`font-bold text-sm ${activeTab==='scan'?'text-blue-600':'text-gray-400'}`}>盤點</button>
              <button onClick={() => setActiveTab('upload')} className={`font-bold text-sm ${activeTab==='upload'?'text-blue-600':'text-gray-400'}`}>建檔</button>
            </nav>
          </header>

          <main className="max-w-6xl mx-auto p-4">
            {activeTab === 'inventory' && (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {inventory.map(item => (
                  <div key={item.id} className="bg-white rounded-2xl p-3 shadow-sm border border-gray-100">
                    <img src={item.media?.[0]?.url} className="w-full aspect-[4/5] object-cover rounded-xl mb-2" />
                    <h3 className="font-bold text-sm truncate">{item.name}</h3>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'scan' && (
              <div className="max-w-md mx-auto space-y-4">
                <button onClick={() => scanCameraRef.current.click()} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">📸 拍照盤點</button>
              </div>
            )}

            {activeTab === 'upload' && (
              <div className="max-w-xl mx-auto">
                {isScanning ? <div className="text-center py-20 font-bold animate-pulse">AI 正在深度掃描圖片內容...</div> : drafts.length === 0 ? (
                   <button onClick={() => cameraInputRef.current.click()} className="w-full bg-gray-900 text-white py-10 rounded-3xl font-black text-xl shadow-xl">➕ 開始 AI 自動辨識建檔</button>
                ) : (
                  <div className="space-y-4">
                    {drafts.map(d => (
                      <div key={d.uid} className="bg-white p-4 rounded-2xl border-2 border-blue-100 flex gap-4">
                        <img src={d.mediaRaw.url} className="w-24 aspect-[3/4] object-cover rounded-xl" />
                        <div className="flex-1 space-y-2">
                          <input value={d.formData.name} onChange={e => updateDraft(d.uid, 'name', e.target.value)} className="w-full font-bold border-b outline-none" />
                          <div className="flex justify-between items-center text-[10px] font-bold">
                             <span className="text-blue-600">AI 已自動填寫名稱、尺寸與標籤</span>
                             <button onClick={() => handleRewriteDescription(false, d.formData.name, d.uid)} className="bg-blue-50 px-2 rounded">✨ 換文案</button>
                          </div>
                          <textarea value={d.formData.description} onChange={e => updateDraft(d.uid, 'description', e.target.value)} className="w-full text-xs bg-gray-50 p-2 rounded h-12 outline-none" />
                        </div>
                      </div>
                    ))}
                    <button onClick={handleSaveAllDrafts} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">儲存至雲端庫存</button>
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

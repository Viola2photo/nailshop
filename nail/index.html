<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>雲端智能建檔系統 (AI Studio 穩定版)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

  <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
  </script>

  <style>
    @supports (padding-bottom: env(safe-area-bottom)) { .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.8rem); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    body { -webkit-tap-highlight-color: transparent; outline: none; background: #F9F9FB; color: #1A1A1A; font-family: sans-serif; }
    input, textarea, select { font-size: 16px !important; }
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); }
    .btn-scale:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const firebaseConfig = {
      apiKey: "AIzaSyDQZGeeubB8bEUL59v9yt0QBAfIWJcvgnw",
      authDomain: "nailproject-40022.firebaseapp.com",
      projectId: "nailproject-40022",
      storageBucket: "nailproject-40022.firebasestorage.app",
      messagingSenderId: "1004628981925",
      appId: "1:1004628981925:web:db01ede0c09f4071d5754c"
    };

    // ✨ 使用您 05:00 截圖中申請的新金鑰 (結尾 N2rw)
    const GEMINI_API_KEY = "AIzaSyCbnXF3tF1y8q43hRkFE3WsytqVHX_N2rw"; 

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'nail-inventory-app';

    const { useState, useRef, useEffect } = React;

    const NAIL_SHAPES = ['超短梯', '短梯', '中梯', '長梯', '超長梯', '短橢圓', '中橢圓', '長橢圓', '細狗尖', '杏仁甲', '中杏仁', '長杏仁', '短圓', '新中方', '長水滴'];
    const COPYWRITING_STYLES = ['隨機驚喜', '法式優雅名媛', '日系甜美純慾', '歐美個性暗黑', '極簡高階質感', '活潑可愛少女'];

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 5000); return () => clearTimeout(timer); }, [onClose]);
      const bgColor = type === 'success' ? 'bg-black' : 'bg-red-600';
      return (
        <div className={`fixed top-12 left-1/2 -translate-x-1/2 w-[90%] md:w-auto max-w-sm ${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[100] border border-white/10 animate-fade-in-up`}>
          <span className="text-xl">{type === 'success' ? '✅' : '⚠️'}</span>
          <span className="font-bold text-sm">{message}</span>
        </div>
      );
    };

    const compressImage = (file, maxRes = 1024) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width: w, height: h } = img;
            if (w > h && w > maxRes) { h *= maxRes / w; w = maxRes; } 
            else if (h > maxRes) { w *= maxRes / h; h = maxRes; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    function App() {
      const [activeTab, setActiveTab] = useState('inventory');
      const [inventory, setInventory] = useState([]);
      const [toastMsg, setToastMsg] = useState(null);
      const [isLoadingDB, setIsLoadingDB] = useState(true);
      const [user, setUser] = useState(null);

      const [isScanning, setIsScanning] = useState(false);
      const [drafts, setDrafts] = useState([]); 
      const [uploadStyle, setUploadStyle] = useState('隨機驚喜');
      const [uploadedMediaRaw, setUploadedMediaRaw] = useState(null);
      const [isStockTaking, setIsStockTaking] = useState(false);
      const [scanLogs, setScanLogs] = useState([]); 
      const [scanSession, setScanSession] = useState({}); 
      const [showCompareModal, setShowCompareModal] = useState(false);
      const [editingItem, setEditingItem] = useState(null);

      const cameraInputRef = useRef(null);
      const galleryInputRef = useRef(null);
      const scanCameraRef = useRef(null);
      const scanGalleryRef = useRef(null);
      const editFileInputRef = useRef(null);
      const manualInputRef = useRef(null);

      const showToast = (message, type = 'success') => setToastMsg({ message, type });

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(setUser);
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) { setIsLoadingDB(false); return; }
        const inventoryRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory');
        const unsubDB = inventoryRef.onSnapshot((snapshot) => {
          const dbData = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
          dbData.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
          setInventory(dbData);
          setIsLoadingDB(false);
        }, (err) => {
          showToast("請確認 Firestore 資料庫已開啟 Native 模式", "error");
        });
        return () => unsubDB();
      }, [user]);

      const callGeminiAI = async (base64Data, promptText) => {
        try {
          const genAI = new GoogleGenerativeAI(GEMINI_API_KEY);
          const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
          const parts = [{ text: `你是美甲大師，請分析圖片並回傳純 JSON。任務：${promptText}` }];
          if (base64Data) parts.push({ inlineData: { mimeType: "image/jpeg", data: base64Data } });
          const result = await model.generateContent({ contents: [{ role: "user", parts }] });
          const text = (await result.response).text();
          return JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());
        } catch(e) {
          console.error("AI Error:", e);
          showToast(`辨識服務連結失敗，建議改用手動建立模式`, "error");
          return null;
        }
      };

      const handleDiagnostic = async () => {
        showToast("啟動 AI 連線測試...", "success");
        const res = await callGeminiAI(null, "回傳 JSON: {\"status\":\"ok\"}");
        if (res) showToast("AI 連線測試成功！新金鑰已生效。", "success");
      };

      const handleBatchScanUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsStockTaking(true);
        try {
          const aiUrl = await compressImage(file, 1024);
          const data = await callGeminiAI(aiUrl.split(',')[1], `盤點。現有：${JSON.stringify(inventory.map(i => ({ id: i.id, name: i.name })))}。回傳：{"results": [{"matchedId": "ID", "detectedSize": "M"}]}`);
          if (data && data.results) {
            let newS = { ...scanSession };
            data.results.forEach(res => {
              if (res.matchedId) {
                const item = inventory.find(i => i.id === res.matchedId);
                if (item) {
                  const sz = res.detectedSize || 'M';
                  newS[item.id] = { ...(newS[item.id]||{}), [sz]: (newS[item.id]?.[sz] || 0) + 1 };
                  setScanLogs(old => [`✅ 偵測：${item.name} (${sz})`, ...old]);
                }
              }
            });
            setScanSession(newS);
          }
        } finally { setIsStockTaking(false); }
      };

      const handleBatchCreationUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsScanning(true); setDrafts([]);
        try {
          const aiUrl = await compressImage(file, 1024);
          const dbUrl = await compressImage(file, 800);
          setUploadedMediaRaw({ url: dbUrl, type: 'image' });
          const data = await callGeminiAI(aiUrl.split(',')[1], `辨識建檔。回傳：{"items": [{"matchedId": "ID或null", "detectedSize": "M", "styleName": "品名", "description": "100字文案", "shape": "甲型", "hashtags": "#標籤"}]}`);
          if (data && data.items) {
            setDrafts(data.items.map((it, i) => ({
                uid: `draft-${Date.now()}-${i}`, isMatch: !!it.matchedId,
                formData: {
                  id: it.matchedId || `NL-${Math.floor(Math.random()*9000+1000)}`,
                  name: it.styleName || '新款式', price: 390,
                  description: it.description || '', shape: it.shape || '短梯',
                  hashtags: it.hashtags || '', detectedSize: it.detectedSize || 'M',
                  stock: { XS: 0, S: 0, M: 1, L: 0 }
                }
            })));
          }
        } finally { setIsScanning(false); }
      };

      const handleManualCreation = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const dbUrl = await compressImage(file, 800);
        setUploadedMediaRaw({ url: dbUrl, type: 'image' });
        setDrafts([{
          uid: `man-${Date.now()}`, isMatch: false,
          formData: {
            id: `NL-${Math.floor(Math.random()*9000+1000)}`, name: '手動輸入名稱', price: 390,
            description: '手動輸入細節', shape: '短梯', hashtags: '#氣質 #美甲',
            detectedSize: 'M', stock: { XS: 0, S: 0, M: 1, L: 0 }
          }
        }]);
      };

      const handleSaveAllDrafts = async () => {
        if (!user || drafts.length === 0) return;
        const batch = db.batch();
        drafts.forEach(d => {
          const ref = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(d.formData.id);
          batch.set(ref, { ...d.formData, media: [{ ...uploadedMediaRaw, id: Date.now().toString(), type: 'image' }], createdAt: new Date().toISOString() });
        });
        await batch.commit(); setDrafts([]); setActiveTab('inventory'); showToast("同步完成！");
      };

      if (!user) return (
        <div className="min-h-screen flex items-center justify-center bg-gray-50 p-6">
          <div className="bg-white p-14 rounded-[56px] shadow-2xl text-center max-w-sm w-full border border-gray-100 animate-fade-in-up">
            <div className="text-7xl mb-6 text-pink-500">💅</div>
            <h1 className="text-3xl font-black mb-2 tracking-tight">雲端管理中心</h1>
            <p className="text-gray-400 text-xs mb-10 font-bold uppercase tracking-widest italic text-black">Management Center</p>
            <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full bg-black text-white py-6 rounded-3xl font-black shadow-xl btn-scale transition-all">Google 快速登入</button>
          </div>
        </div>
      );

      const renderContent = () => {
        switch(activeTab) {
          case 'inventory':
            return (
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5">
                {isLoadingDB ? (
                   <div className="col-span-full py-40 text-center font-black text-gray-200 text-3xl">載入中...</div>
                ) : inventory.length === 0 ? (
                   <div className="col-span-full py-40 text-center text-gray-300 font-bold italic">目前無數據</div>
                ) : inventory.map(item => (
                  <div key={item.id} onClick={() => setEditingItem(JSON.parse(JSON.stringify(item)))} className="bg-white rounded-[44px] p-3 shadow-sm border border-gray-100 active:scale-95 transition-all hover:shadow-lg cursor-pointer">
                    <div className="aspect-[4/5] rounded-[34px] overflow-hidden mb-4 bg-gray-50">
                       <img src={item.media?.[0]?.url} className="w-full h-full object-cover" />
                    </div>
                    <h3 className="font-black text-base px-3 truncate mb-3 text-black font-black">{item.name}</h3>
                    <div className="flex gap-1.5 px-2">
                       {['XS','S','M','L'].map(s => <div key={s} className={`flex-1 text-[10px] text-center rounded-xl py-2 font-black ${item.stock?.[s]>0?'bg-black text-white':'bg-gray-100 text-gray-300'}`}>{item.stock?.[s]||0}</div>)}
                    </div>
                  </div>
                ))}
              </div>
            );
          case 'scan':
            return (
              <div className="max-w-md mx-auto py-10 space-y-6 text-center text-black">
                <div className="bg-white p-14 rounded-[60px] border-2 border-dashed border-gray-200 shadow-sm text-black">
                  <div className="text-7xl mb-6 text-blue-500 font-black">🔍</div>
                  <h2 className="text-2xl font-black mb-3">智慧盤點模式</h2>
                  <p className="text-gray-400 text-sm mb-12 font-bold leading-relaxed">請拍照盤點盒，AI 將自動對齊庫存</p>
                  <div className="flex flex-col gap-4 font-black">
                    <button onClick={() => scanCameraRef.current.click()} className="w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-xl shadow-2xl btn-scale">📸 開啟相機</button>
                    <button onClick={() => scanGalleryRef.current.click()} className="w-full bg-white text-blue-600 border-2 border-blue-600 py-5 rounded-3xl font-black text-lg btn-scale transition-all">🖼️ 相簿匯入</button>
                  </div>
                </div>
                {scanLogs.length > 0 && (
                   <div className="bg-white rounded-[40px] p-8 border shadow-sm text-left">
                      <div className="flex justify-between items-center mb-6 border-b pb-4 text-black">
                        <h3 className="font-black text-xl">偵測紀錄</h3>
                        <button onClick={() => setShowCompareModal(true)} className="bg-pink-500 text-white text-xs font-black px-5 py-2.5 rounded-full animate-pulse shadow-lg font-black">核對確認</button>
                      </div>
                      <div className="max-h-72 overflow-y-auto space-y-3 hide-scrollbar text-black font-bold">
                        {scanLogs.map((log, i) => <div key={i} className="text-xs bg-gray-50 p-4 rounded-2xl border border-gray-100">{log}</div>)}
                      </div>
                   </div>
                )}
              </div>
            );
          case 'upload':
            return (
              <div className="max-w-xl mx-auto py-8 text-center text-black">
                {isScanning ? (
                  <div className="py-32 animate-pulse font-black text-3xl">🧠 AI 正在進行深度辨識...</div>
                ) : drafts.length === 0 ? (
                  <div className="bg-white rounded-[60px] border-2 border-dashed border-gray-200 p-16 shadow-sm">
                    <div className="text-7xl mb-8 font-black">✨</div>
                    <h2 className="text-3xl font-black mb-10 tracking-tight text-black font-black">AI 批次建檔</h2>
                    <div className="mb-12">
                      <label className="block text-[11px] font-black text-gray-400 mb-3 uppercase tracking-widest text-center font-black">文案生成靈魂風格</label>
                      <select value={uploadStyle} onChange={(e) => setUploadStyle(e.target.value)} className="w-full bg-gray-50 border-none rounded-3xl p-5 font-black text-pink-500 text-center outline-none shadow-inner cursor-pointer appearance-none font-black">
                        {COPYWRITING_STYLES.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                    </div>
                    <div className="flex flex-col gap-4 font-black">
                      <button onClick={() => cameraInputRef.current.click()} className="w-full bg-black text-white py-6 rounded-3xl font-black text-2xl shadow-2xl btn-scale font-black">📸 拍照建檔</button>
                      <button onClick={() => galleryInputRef.current.click()} className="w-full bg-white text-black border-2 border-black py-5 rounded-3xl font-black text-lg btn-scale transition-all">🖼️ 相簿選取</button>
                      <button onClick={() => manualInputRef.current.click()} className="mt-8 text-xs font-black text-blue-400 underline uppercase tracking-widest font-black">AI 目前停用？試試手動建立模式</button>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-6 pb-20 text-left text-black font-black">
                    <div className="flex justify-between items-center bg-black text-white p-6 rounded-[32px] shadow-xl">
                       <div className="font-black text-lg">✅ 已建立 {drafts.length} 款式</div>
                       <button onClick={() => setDrafts([])} className="text-xs bg-white/20 px-5 py-2 rounded-full font-black uppercase">Reset</button>
                    </div>
                    {drafts.map(d => (
                      <div key={d.uid} className="bg-white p-8 rounded-[48px] border-2 border-gray-50 shadow-xl space-y-5 animate-fade-in-up">
                        <input value={d.formData.name} onChange={e => setDrafts(drafts.map(it => it.uid===d.uid?{...it, formData:{...it.formData, name: e.target.value}}:it))} className="w-full font-black text-2xl outline-none border-b border-gray-100 pb-3 font-black" />
                        <textarea value={d.formData.description} onChange={e => setDrafts(drafts.map(it => it.uid===d.uid?{...it, formData:{...it.formData, description: e.target.value}}:it))} className="w-full text-sm bg-gray-50 p-5 rounded-3xl h-32 outline-none border-none text-black font-bold leading-relaxed font-black" />
                        <div className="flex flex-wrap gap-3 font-black">
                           <input placeholder="#標籤" value={d.formData.hashtags} onChange={e => setDrafts(drafts.map(it => it.uid===d.uid?{...it, formData:{...it.formData, hashtags: e.target.value}}:it))} className="flex-1 text-xs font-black bg-pink-50 text-pink-500 p-5 rounded-2xl outline-none border-none shadow-inner font-black" />
                           <div className="bg-black text-white px-6 py-5 rounded-2xl text-xs font-black flex items-center font-black">SIZE: M</div>
                        </div>
                      </div>
                    ))}
                    <button onClick={handleSaveAllDrafts} className="w-full bg-black text-white py-7 rounded-[32px] font-black text-2xl shadow-2xl btn-active transition-all font-black">確認儲存至雲端 🚀</button>
                  </div>
                )}
              </div>
            );
          case 'export':
            return (
              <div className="max-w-md mx-auto py-10 bg-white p-20 rounded-[64px] shadow-sm text-center border text-black font-black">
                 <div className="text-8xl mb-12 font-black">📊</div>
                 <h2 className="text-3xl font-black mb-16 tracking-tight text-black font-black">全庫存匯出系統</h2>
                 <button onClick={() => {
                    const content = ['編號,名稱,甲型,描述,標籤,XS,S,M,L', ...inventory.map(i => [i.id, i.name, i.shape, i.description?.replace(/,/g,' '), i.hashtags, i.stock.XS, i.stock.S, i.stock.M, i.stock.L].join(','))].join('\n');
                    const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `Inventory.csv`; link.click();
                 }} className="bg-black text-white py-6 rounded-[28px] font-black w-full shadow-2xl btn-active transition-all font-black">⬇️ 下載 CSV 檔案</button>
              </div>
            );
          default: return null;
        }
      };

      return (
        <div className="pb-36 relative min-h-screen">
          {toastMsg && <Toast message={toastMsg.message} type={toastMsg.type} onClose={() => setToastMsg(null)} />}
          
          {/* ✏️ 完整功能編輯窗：含紅色 X 刪除 */}
          {editingItem && (
            <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-xl flex items-center justify-center p-4">
               <div className="bg-white rounded-[60px] p-10 w-full max-w-2xl max-h-[92vh] overflow-y-auto hide-scrollbar animate-fade-in-up shadow-2xl text-black font-black">
                  <div className="flex justify-between items-center mb-10 border-b pb-6">
                     <h2 className="font-black text-3xl tracking-tight text-black font-black font-black">編輯款式詳情</h2>
                     <button onClick={() => setEditingItem(null)} className="p-4 bg-gray-50 rounded-full hover:bg-gray-100 transition-colors text-black text-2xl font-black">✕</button>
                  </div>
                  <div className="space-y-10 text-left font-black">
                     <div>
                        <div className="flex justify-between items-end mb-5 font-black">
                          <label className="text-[11px] font-black text-gray-400 uppercase tracking-widest block font-black">媒體管理 (增/刪照片)</label>
                          <button onClick={() => editFileInputRef.current.click()} className="text-[11px] bg-black text-white px-6 py-2.5 rounded-full font-black shadow-lg btn-scale font-black">＋ 增加內容</button>
                        </div>
                        <div className="grid grid-cols-4 gap-4 font-black">
                           {editingItem.media?.map((m, i) => (
                             <div key={m.id} className="aspect-[3/4] relative group rounded-3xl overflow-hidden border border-gray-100 bg-gray-50 shadow-inner">
                               <img src={m.url} className="w-full h-full object-cover" />
                               <button onClick={() => setEditingItem({...editingItem, media: editingItem.media.filter((_, idx)=>idx!==i)})} className="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-xl text-[12px] font-bold shadow-2xl btn-active font-black">✕</button>
                             </div>
                           ))}
                        </div>
                     </div>
                     <div className="grid grid-cols-2 gap-6 font-black font-black">
                        <div><label className="block text-[11px] font-black text-gray-400 mb-2 uppercase tracking-wider text-black font-black">品名</label><input value={editingItem.name} onChange={e => setEditingItem({...editingItem, name:e.target.value})} className="w-full p-5 bg-gray-50 rounded-3xl font-black text-lg outline-none border-none shadow-inner" /></div>
                        <div><label className="block text-[11px] font-black text-gray-400 mb-2 uppercase tracking-wider text-black font-black">甲型</label><select value={editingItem.shape} onChange={e => setEditingItem({...editingItem, shape:e.target.value})} className="w-full p-5 bg-gray-50 rounded-3xl font-black text-lg outline-none border-none shadow-inner font-black">{NAIL_SHAPES.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                     </div>
                     <div><label className="block text-[11px] font-black text-gray-400 mb-2 uppercase tracking-wider text-black font-black font-black">文案內容</label><textarea value={editingItem.description} onChange={e => setEditingItem({...editingItem, description:e.target.value})} className="w-full p-6 bg-gray-50 rounded-3xl font-bold text-sm h-40 outline-none border-none shadow-inner leading-relaxed focus:ring-2 ring-black text-black font-black" /></div>
                     <div><label className="block text-[11px] font-black text-gray-400 mb-2 uppercase tracking-wider text-pink-500 font-black font-black">款式標籤 (#)</label><input value={editingItem.hashtags} onChange={e => setEditingItem({...editingItem, hashtags:e.target.value})} placeholder="#優雅" className="w-full p-5 bg-pink-50 rounded-3xl font-black text-pink-600 outline-none border-none shadow-inner focus:ring-2 ring-pink-300 font-black" /></div>
                     <div className="grid grid-cols-4 gap-4 text-black font-black">
                        {['XS','S','M','L'].map(s => <div key={s} className="text-center font-black"><div className="text-[11px] font-black text-gray-400 mb-2 uppercase font-mono">{s}</div><input type="number" value={editingItem.stock[s]} onChange={e => setEditingItem({...editingItem, stock:{...editingItem.stock, [s]:parseInt(e.target.value)||0}})} className="w-full text-center border-none bg-gray-50 p-5 rounded-3xl font-black text-xl shadow-inner focus:ring-2 ring-black font-black" /></div>)}
                     </div>
                     <div className="flex gap-5 pt-10 border-t border-gray-100 font-black">
                        <button onClick={async () => {if(window.confirm("確定刪除此款式？")) { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).delete(); setEditingItem(null); showToast("已從雲端移除"); }}} className="flex-1 bg-red-50 text-red-500 py-6 rounded-[30px] font-black tracking-tight btn-scale font-black">刪除款式</button>
                        <button onClick={async () => { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).update(editingItem); setEditingItem(null); showToast("更新完成 💾"); }} className="flex-[2] bg-black text-white py-6 rounded-[30px] font-black text-xl shadow-2xl btn-active transition-all font-black">確認儲存更新</button>
                     </div>
                  </div>
               </div>
            </div>
          )}

          <header className="glass-effect sticky top-0 z-30 px-8 py-5 flex justify-between items-center border-b border-gray-100 font-black">
            <h1 className="font-black text-2xl tracking-tighter text-black">MyNail. <span className="text-gray-300 font-medium tracking-normal ml-1 italic font-black font-black">Cloud</span></h1>
            <div className="flex gap-4">
              <button onClick={handleDiagnostic} className="text-[10px] font-black text-blue-500 bg-blue-50 px-3 py-1 rounded-full border border-blue-100 font-black">診斷</button>
              <button onClick={() => auth.signOut()} className="text-[10px] font-black text-gray-400 uppercase font-black">Logout</button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto p-4 animate-fade-in-up">
            {renderContent()}
          </main>

          <nav className="fixed bottom-0 left-0 right-0 glass-effect border-t border-gray-100 pb-safe z-40 flex justify-around items-end px-6 h-28 font-black">
            <button onClick={() => setActiveTab('inventory')} className={`flex-1 pb-6 pt-5 flex flex-col items-center gap-1.5 transition-all ${activeTab === 'inventory' ? 'text-black scale-110' : 'text-gray-300'}`}>
              <span className="text-3xl font-black">📦</span><span className="text-[10px] font-black uppercase tracking-widest text-black font-black">Store</span>
            </button>
            <button onClick={() => setActiveTab('scan')} className={`flex-1 pb-6 pt-5 flex flex-col items-center gap-1.5 transition-all ${activeTab === 'scan' ? 'text-black scale-110' : 'text-gray-300'}`}>
              <span className="text-3xl font-black font-black">🔍</span><span className="text-[10px] font-black uppercase tracking-widest text-black font-black">Scan</span>
            </button>
            <button onClick={() => setActiveTab('upload')} className="relative flex flex-col items-center justify-center -top-10 w-24">
              <div className={`w-20 h-20 rounded-[32px] flex items-center justify-center text-white shadow-2xl transition-all btn-active ${activeTab === 'upload' ? 'bg-pink-500 scale-110' : 'bg-black'}`}>
                <span className="text-5xl font-light font-black font-black">＋</span>
              </div>
              <span className={`text-[10px] font-black mt-4 uppercase tracking-widest ${activeTab === 'upload' ? 'text-pink-500' : 'text-gray-400'}`}>Add</span>
            </button>
            <button onClick={() => setActiveTab('export')} className={`flex-1 pb-6 pt-5 flex flex-col items-center gap-1.5 transition-all ${activeTab === 'export' ? 'text-black scale-110' : 'text-gray-300'}`}>
              <span className="text-3xl font-black">📊</span><span className="text-[10px] font-black uppercase tracking-widest text-black font-black">CSV</span>
            </button>
          </nav>

          <input type="file" multiple ref={editFileInputRef} className="hidden" />
          <input type="file" accept="image/*" ref={manualInputRef} className="hidden" />
          <input type="file" accept="image/*" capture="environment" ref={cameraInputRef} className="hidden" />
          <input type="file" accept="image/*" ref={galleryInputRef} className="hidden" />
          <input type="file" accept="image/*" capture="environment" ref={scanCameraRef} className="hidden" />
          <input type="file" accept="image/*" ref={scanGalleryRef} className="hidden" />
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

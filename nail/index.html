<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>雲端智能建檔系統 - 專業進階版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  
  <!-- PapaParse for CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-[#F8F9FA] text-gray-800 font-sans selection:bg-blue-100">
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyDQZGeeubB8bEUL59v9yt0QBAfIWJcvgnw",
      authDomain: "nailproject-40022.firebaseapp.com",
      projectId: "nailproject-40022",
      storageBucket: "nailproject-40022.firebasestorage.app",
      messagingSenderId: "1004628981925",
      appId: "1:1004628981925:web:db01ede0c09f4071d5754c"
    };

    const apiKey = ""; // API Key 留空，由環境提供

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'nail-inventory-app';

    const { useState, useRef, useEffect, useMemo } = React;

    const NAIL_SHAPES = ['短橢圓', '中橢圓', '長橢圓', '細狗尖', '杏仁甲', '短圓', '新中方', '短梯', '中梯', '長梯', '超長梯', '長水滴'];

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
      const bgColor = type === 'success' ? 'bg-gray-900' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
      return (
        <div className={`fixed bottom-24 md:bottom-10 left-1/2 transform -translate-x-1/2 w-[90%] md:w-auto max-w-sm ${bgColor} text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 z-[100] border border-white/10 animate-bounce-short text-center`}>
          <span className="font-bold text-sm">{message}</span>
        </div>
      );
    };

    const compressImage = (file, maxResolution = 800) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width, height } = img;
            if (width > height && width > maxResolution) { height *= maxResolution / width; width = maxResolution; } 
            else if (height > maxResolution) { width *= maxResolution / height; height = maxResolution; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    function App() {
      const [activeTab, setActiveTab] = useState('inventory');
      const [inventory, setInventory] = useState([]);
      const [toastMsg, setToastMsg] = useState(null);
      const [isLoadingDB, setIsLoadingDB] = useState(true);
      const [user, setUser] = useState(null);

      // 建檔相關狀態
      const [isScanning, setIsScanning] = useState(false);
      const [drafts, setDrafts] = useState([]); 
      const [uploadedMediaRaw, setUploadedMediaRaw] = useState(null); 
      
      const cameraInputRef = useRef(null);
      const galleryInputRef = useRef(null);
      const csvInputRef = useRef(null);
      const editFileInputRef = useRef(null);
      
      const [editingItem, setEditingItem] = useState(null);
      const [scanQuery, setScanQuery] = useState('');

      const showToast = (message, type = 'success') => setToastMsg({ message, type });

      // 自動產生 NAIL_xxxx 編號邏輯
      const getNextStandardId = (currentInventory, offset = 0) => {
        const nailIds = currentInventory
          .map(item => {
            const match = item.id?.match(/NAIL_(\d+)/);
            return match ? parseInt(match[1]) : 0;
          })
          .filter(id => !isNaN(id));
        
        const maxId = nailIds.length > 0 ? Math.max(...nailIds) : 0;
        const nextId = maxId + 1 + offset;
        return `NAIL_${nextId.toString().padStart(4, '0')}`;
      };

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) { setIsLoadingDB(false); return; }
        const inventoryRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory');
        const unsubscribeDB = inventoryRef.onSnapshot((snapshot) => {
          const dbData = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
          dbData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          setInventory(dbData);
          setIsLoadingDB(false);
        });
        return () => unsubscribeDB();
      }, [user]);

      // --- 功能：手動建檔 ---
      const handleManualAdd = () => {
        const nextId = getNextStandardId(inventory, drafts.length);
        const newDraft = {
          uid: `manual-${Date.now()}`,
          isMatch: false,
          formData: {
            id: nextId,
            name: '',
            price: 390,
            description: '',
            shape: '',
            hashtags: '',
            stock: { XS: 0, S: 0, M: 0, L: 0 }
          }
        };
        setDrafts([...drafts, newDraft]);
        showToast("已新增一筆空白草稿");
      };

      // --- 功能：CSV 匯入 ---
      const handleCsvImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        Papa.parse(file, {
          header: true, skipEmptyLines: true,
          complete: (results) => {
            const rows = results.data;
            let currentOffset = drafts.length;
            const newDrafts = rows.map((row, index) => {
              const nextId = getNextStandardId(inventory, currentOffset++);
              return {
                uid: `csv-${Date.now()}-${index}`,
                isMatch: false,
                formData: {
                  id: nextId,
                  name: row['名稱'] || row['styleName'] || '未命名 CSV 款式',
                  price: parseInt(row['價格'] || row['price']) || 390,
                  description: row['描述'] || row['說明'] || row['description'] || '',
                  shape: NAIL_SHAPES.includes(row['甲型'] || row['shape']) ? (row['甲型'] || row['shape']) : '',
                  hashtags: row['標籤'] || row['hashtags'] || '',
                  stock: {
                    XS: parseInt(row['XS']) || 0,
                    S: parseInt(row['S']) || 0,
                    M: parseInt(row['M']) || 0,
                    L: parseInt(row['L']) || 0
                  }
                }
              };
            });
            setDrafts(prev => [...prev, ...newDrafts]);
            showToast(`成功匯入 ${newDrafts.length} 筆資料`);
            e.target.value = '';
          }
        });
      };

      // --- 功能：AI 掃描 ---
      const handleAIScan = async (e) => {
        const file = e.target.files[0]; if (!file) return; e.target.value = '';
        setIsScanning(true);
        try {
          const aiImageUrl = await compressImage(file, 1600);
          const dbImageUrl = await compressImage(file, 800);
          setUploadedMediaRaw({ url: dbImageUrl, extension: 'jpg', type: 'image' });
          
          const base64Data = aiImageUrl.split(',')[1];
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: `掃描這張穿戴甲照片。1.讀取打勾尺寸。2.與現有庫存比對：${JSON.stringify(inventory.map(i => ({id: i.id, name: i.name})))}。3.生成資訊：名稱、描述(15字內)、甲型(從[${NAIL_SHAPES.join(',')}]挑選)、標籤。回傳JSON {"items": [{"matchedId": "ID或null", "detectedSize": "XS/S/M/L", "styleName": "名稱", "description": "描述", "shape": "甲型", "hashtags": "#標籤"}]}` }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }]
            })
          });
          const jsonRes = await response.json();
          const text = jsonRes.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
          const data = JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());
          
          let currentOffset = drafts.length;
          const newDrafts = (data.items || []).map((item, index) => {
            const isMatch = !!item.matchedId;
            const matchedItem = isMatch ? inventory.find(i => i.id === item.matchedId) : null;
            let finalId = isMatch && matchedItem ? matchedItem.id : getNextStandardId(inventory, currentOffset++);

            return {
              uid: `ai-${Date.now()}-${index}`, 
              isMatch: isMatch && matchedItem, 
              matchedItem: matchedItem,
              formData: {
                id: finalId,
                name: isMatch && matchedItem ? matchedItem.name : (item.styleName || '新款式'),
                price: isMatch && matchedItem ? matchedItem.price : 390,
                description: isMatch && matchedItem ? matchedItem.description : (item.description || ''),
                shape: isMatch && matchedItem ? matchedItem.shape : (NAIL_SHAPES.includes(item.shape) ? item.shape : ''),
                hashtags: isMatch && matchedItem ? matchedItem.hashtags : (item.hashtags || ''),
                detectedSize: item.detectedSize || 'M',
                stock: { XS: 0, S: 0, M: 0, L: 0, ...(item.detectedSize && !isMatch ? { [item.detectedSize]: 1 } : {}) }
              }
            };
          });
          setDrafts(prev => [...prev, ...newDrafts]);
          showToast(`辨識成功`);
        } catch (err) { showToast("AI 分析失敗", "error"); } finally { setIsScanning(false); }
      };

      const updateDraft = (uid, field, value) => { setDrafts(drafts.map(d => d.uid !== uid ? d : { ...d, formData: { ...d.formData, [field]: value } })); };
      
      const handleSaveDrafts = async () => {
        if (!user) return;
        try {
          const batch = db.batch();
          for (const draft of drafts) {
            const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(draft.formData.id);
            if (draft.isMatch && draft.matchedItem) {
              const newStock = { ...draft.matchedItem.stock };
              const size = draft.formData.detectedSize;
              if (size) newStock[size] = (newStock[size] || 0) + 1;
              let newMedia = [...(draft.matchedItem.media || [])];
              if (uploadedMediaRaw) newMedia.push({ ...uploadedMediaRaw, id: Math.random().toString(36).substr(2, 9) });
              batch.update(docRef, { stock: newStock, media: newMedia });
            } else {
              batch.set(docRef, { ...draft.formData, media: uploadedMediaRaw ? [{...uploadedMediaRaw, id: 'main'}] : [], createdAt: new Date().toISOString() });
            }
          }
          await batch.commit();
          setDrafts([]); setUploadedMediaRaw(null); setActiveTab('inventory');
          showToast('已同步至雲端庫存');
        } catch (e) { showToast('儲存失敗', 'error'); }
      };

      // --- 盤點功能 ---
      const updateStockCount = async (itemId, size, delta) => {
        const item = inventory.find(i => i.id === itemId);
        if (!item) return;
        const newStock = { ...item.stock, [size]: Math.max(0, (item.stock[size] || 0) + delta) };
        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(itemId).update({ stock: newStock });
      };

      const filteredInventory = inventory.filter(i => i.id.toLowerCase().includes(scanQuery.toLowerCase()) || i.name.toLowerCase().includes(scanQuery.toLowerCase()));

      return (
        <div className="min-h-screen bg-[#F8F9FA] pb-24">
          {toastMsg && <Toast message={toastMsg.message} type={toastMsg.type} onClose={() => setToastMsg(null)} />}
          
          <header className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 px-6 py-4 flex justify-between items-center">
            <h1 className="text-xl font-black">💅 智能建檔系統</h1>
            {user && <button onClick={() => auth.signOut()} className="text-xs text-gray-400 font-bold">登出</button>}
          </header>

          {!user ? (
            <div className="flex flex-col items-center justify-center pt-32 px-6">
              <div className="bg-white p-10 rounded-[2.5rem] shadow-xl text-center w-full max-w-sm">
                <div className="text-6xl mb-6">🔐</div>
                <h2 className="text-2xl font-black mb-6">歡迎回來</h2>
                <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full bg-gray-900 text-white py-4 rounded-2xl font-black shadow-lg">Google 登入</button>
              </div>
            </div>
          ) : (
            <main className="max-w-4xl mx-auto px-6 pt-8">
              {/* 分頁選擇 */}
              <div className="flex gap-2 mb-8 bg-white p-1.5 rounded-2xl shadow-sm">
                {['inventory', 'scan', 'upload'].map(tab => (
                  <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-3 rounded-xl font-black text-sm transition-all ${activeTab === tab ? 'bg-gray-900 text-white shadow-md scale-[1.02]' : 'text-gray-400 hover:text-gray-600'}`}>
                    {tab === 'inventory' ? '📦 庫存總覽' : tab === 'scan' ? '🔍 快速盤點' : '➕ 新增款式'}
                  </button>
                ))}
              </div>

              {/* 庫存總覽分頁 */}
              {activeTab === 'inventory' && (
                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                  {inventory.map(item => (
                    <div key={item.id} onClick={() => setEditingItem(item)} className="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md">
                      <div className="aspect-square bg-gray-50 rounded-2xl mb-3 overflow-hidden">
                        {item.media?.[0] ? <img src={item.media[0].url} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-gray-300 text-[10px] font-bold">NO IMAGE</div>}
                      </div>
                      <h3 className="font-black text-sm truncate">{item.name}</h3>
                      <p className="text-[10px] text-gray-400 font-bold mb-2">{item.id}</p>
                      <div className="flex gap-1">
                        {['XS', 'S', 'M', 'L'].map(s => <div key={s} className="flex-1 bg-gray-50 text-[9px] font-bold text-center py-1 rounded-md">{s}:{item.stock[s]}</div>)}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* 快速盤點分頁 */}
              {activeTab === 'scan' && (
                <div className="space-y-4">
                  <div className="bg-white p-2 rounded-2xl shadow-sm flex items-center px-4">
                    <span className="mr-3">🔍</span>
                    <input type="text" placeholder="搜尋編號或名稱..." value={scanQuery} onChange={e => setScanQuery(e.target.value)} className="w-full py-3 outline-none font-bold" />
                  </div>
                  {filteredInventory.map(item => (
                    <div key={item.id} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-4">
                      <div className="w-16 h-16 bg-gray-50 rounded-xl overflow-hidden flex-shrink-0">
                        {item.media?.[0] && <img src={item.media[0].url} className="w-full h-full object-cover" />}
                      </div>
                      <div className="flex-1 min-w-0">
                        <h4 className="font-black text-sm truncate">{item.name}</h4>
                        <p className="text-[10px] text-blue-500 font-black">{item.id} | {item.shape || '未定甲型'}</p>
                      </div>
                      <div className="grid grid-cols-4 gap-1">
                        {['XS', 'S', 'M', 'L'].map(s => (
                          <div key={s} className="flex flex-col items-center">
                            <span className="text-[9px] font-black text-gray-300 mb-1">{s}</span>
                            <div className="flex items-center bg-gray-50 rounded-lg overflow-hidden border">
                              <button onClick={() => updateStockCount(item.id, s, -1)} className="px-2 py-1 text-xs hover:bg-gray-200">-</button>
                              <span className="px-1 text-xs font-black min-w-[20px] text-center">{item.stock[s]}</span>
                              <button onClick={() => updateStockCount(item.id, s, 1)} className="px-2 py-1 text-xs hover:bg-gray-200">+</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* 新增款式分頁 */}
              {activeTab === 'upload' && (
                <div className="space-y-6">
                  {drafts.length === 0 ? (
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <button onClick={handleManualAdd} className="bg-white p-8 rounded-[2rem] shadow-sm border-2 border-dashed border-gray-100 flex flex-col items-center hover:bg-gray-50 transition-all">
                        <span className="text-4xl mb-4">✍️</span>
                        <span className="font-black">手動輸入</span>
                      </button>
                      <button onClick={() => csvInputRef.current.click()} className="bg-white p-8 rounded-[2rem] shadow-sm border-2 border-dashed border-gray-100 flex flex-col items-center hover:bg-gray-50 transition-all">
                        <span className="text-4xl mb-4">📄</span>
                        <span className="font-black">CSV 匯入</span>
                        <input type="file" accept=".csv" ref={csvInputRef} onChange={handleCsvImport} className="hidden" />
                      </button>
                      <button onClick={() => cameraInputRef.current.click()} className="bg-white p-8 rounded-[2rem] shadow-sm border-2 border-dashed border-gray-100 flex flex-col items-center hover:bg-gray-50 transition-all">
                        <span className="text-4xl mb-4">📸</span>
                        <span className="font-black">AI 拍照辨識</span>
                        <input type="file" accept="image/*" capture="environment" ref={cameraInputRef} onChange={handleAIScan} className="hidden" />
                      </button>
                    </div>
                  ) : (
                    <div className="space-y-6">
                      <div className="flex justify-between items-center bg-gray-900 text-white p-6 rounded-3xl">
                        <h2 className="font-black">待確認草稿 ({drafts.length})</h2>
                        <button onClick={() => setDrafts([])} className="text-xs text-gray-400">全部清空</button>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {drafts.map(d => (
                          <div key={d.uid} className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 space-y-4">
                            <div className="flex justify-between">
                              <span className="text-[10px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-lg">ID: {d.formData.id}</span>
                              <button onClick={() => setDrafts(drafts.filter(dr => dr.uid !== d.uid))} className="text-gray-300">✕</button>
                            </div>
                            <input type="text" placeholder="款式名稱" value={d.formData.name} onChange={e => updateDraft(d.uid, 'name', e.target.value)} className="w-full bg-gray-50 p-3 rounded-xl font-bold outline-none border border-transparent focus:border-blue-100" />
                            <textarea placeholder="短描述描述..." value={d.formData.description} onChange={e => updateDraft(d.uid, 'description', e.target.value)} className="w-full bg-gray-50 p-3 rounded-xl text-sm font-medium h-20 outline-none" />
                            <div className="flex gap-2">
                              <select value={d.formData.shape} onChange={e => updateDraft(d.uid, 'shape', e.target.value)} className="flex-1 bg-gray-50 p-3 rounded-xl text-xs font-bold outline-none">
                                <option value="">選擇甲型</option>
                                {NAIL_SHAPES.map(s => <option key={s} value={s}>{s}</option>)}
                              </select>
                              <input type="text" placeholder="#標籤" value={d.formData.hashtags} onChange={e => updateDraft(d.uid, 'hashtags', e.target.value)} className="flex-1 bg-gray-50 p-3 rounded-xl text-xs font-bold outline-none" />
                            </div>
                            <div className="grid grid-cols-4 gap-2">
                              {['XS', 'S', 'M', 'L'].map(s => (
                                <div key={s}>
                                  <div className="text-[10px] text-center font-black text-gray-300 mb-1">{s}</div>
                                  <input type="number" value={d.formData.stock[s]} onChange={e => updateDraft(d.uid, 'stock', {...d.formData.stock, [s]: parseInt(e.target.value) || 0})} className="w-full text-center bg-gray-50 py-2 rounded-lg font-black text-sm" />
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                      <button onClick={handleSaveDrafts} className="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl hover:bg-blue-700 active:scale-95 transition-all">🚀 確認並同步至雲端庫存</button>
                    </div>
                  )}
                </div>
              )}
            </main>
          )}

          {/* 編輯 Modal */}
          {editingItem && (
            <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-md flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl space-y-6">
                <div className="flex justify-between items-center">
                  <h2 className="text-xl font-black">款式編輯</h2>
                  <button onClick={() => setEditingItem(null)} className="text-gray-300">✕</button>
                </div>
                <div className="space-y-4">
                   <div className="flex gap-4 items-center">
                      <div className="w-20 h-20 bg-gray-100 rounded-2xl overflow-hidden border">
                        {editingItem.media?.[0] && <img src={editingItem.media[0].url} className="w-full h-full object-cover" />}
                      </div>
                      <div className="flex-1">
                        <label className="text-[10px] font-black text-gray-400 block mb-1">編號</label>
                        <div className="bg-gray-50 p-3 rounded-xl font-black text-sm">{editingItem.id}</div>
                      </div>
                   </div>
                   <input type="text" value={editingItem.name} onChange={e => setEditingItem({...editingItem, name: e.target.value})} className="w-full bg-gray-50 p-4 rounded-2xl font-black" placeholder="名稱" />
                   <textarea value={editingItem.description} onChange={e => setEditingItem({...editingItem, description: e.target.value})} className="w-full bg-gray-50 p-4 rounded-2xl text-sm font-medium h-24" placeholder="描述" />
                   <div className="grid grid-cols-2 gap-2">
                     <select value={editingItem.shape} onChange={e => setEditingItem({...editingItem, shape: e.target.value})} className="bg-gray-50 p-4 rounded-2xl text-sm font-bold">
                        {NAIL_SHAPES.map(s => <option key={s} value={s}>{s}</option>)}
                     </select>
                     <input type="text" value={editingItem.hashtags} onChange={e => setEditingItem({...editingItem, hashtags: e.target.value})} className="bg-gray-50 p-4 rounded-2xl text-sm font-bold" placeholder="#標籤" />
                   </div>
                </div>
                <div className="flex gap-3">
                   <button onClick={() => { if(confirm('確定刪除？')) { db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).delete(); setEditingItem(null); } }} className="flex-1 bg-red-50 text-red-500 py-4 rounded-2xl font-black">刪除</button>
                   <button onClick={async () => { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('inventory').doc(editingItem.id).update(editingItem); setEditingItem(null); showToast('已儲存'); }} className="flex-[2] bg-gray-900 text-white py-4 rounded-2xl font-black shadow-lg">儲存變更</button>
                </div>
              </div>
            </div>
          )}

          {/* 手機底部導覽 */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t flex justify-around items-center h-20 md:hidden px-4 z-40">
             <button onClick={() => setActiveTab('inventory')} className={`flex flex-col items-center gap-1 ${activeTab === 'inventory' ? 'text-gray-900' : 'text-gray-300'}`}>
                <span className="text-2xl">📦</span><span className="text-[10px] font-black">總覽</span>
             </button>
             <button onClick={() => setActiveTab('scan')} className={`flex flex-col items-center gap-1 ${activeTab === 'scan' ? 'text-gray-900' : 'text-gray-300'}`}>
                <span className="text-2xl">🔍</span><span className="text-[10px] font-black">盤點</span>
             </button>
             <button onClick={() => setActiveTab('upload')} className={`w-14 h-14 rounded-full flex items-center justify-center text-2xl -top-6 relative shadow-2xl transition-all ${activeTab === 'upload' ? 'bg-blue-600 text-white rotate-45' : 'bg-gray-900 text-white'}`}>+</button>
             <button onClick={() => showToast('匯出功能研發中', 'info')} className="flex flex-col items-center gap-1 text-gray-300">
                <span className="text-2xl">📊</span><span className="text-[10px] font-black">報表</span>
             </button>
             <button onClick={() => auth.signOut()} className="flex flex-col items-center gap-1 text-gray-300">
                <span className="text-2xl">👤</span><span className="text-[10px] font-black">我的</span>
             </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes bounce-short { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
    .animate-bounce-short { animation: bounce-short 0.5s ease-out; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</body>
</html>

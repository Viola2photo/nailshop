<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MyNail 雲端管理中心</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase Scripts (保留您的原始架構引用) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @supports (padding-bottom: env(safe-area-bottom)) { .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.8rem); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    /* 隱藏原生卷軸但保持可滾動 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 圖示元件 (Svg Icons) ---
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconList = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    const IconImage = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconUploadCloud = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path><polyline points="16 16 12 12 8 16"></polyline></svg>;

    const App = () => {
      const [activeTab, setActiveTab] = useState('list'); // 'list' or 'add'
      const [inventory, setInventory] = useState([]);
      const fileInputRef = useRef(null);
      const csvInputRef = useRef(null);
      
      const defaultForm = {
        id: '', name: '', shape: '中長水滴', description: '', hashtags: '', 
        stock: { XS: 0, S: 0, M: 0, L: 0 }, image: ''
      };
      const [formData, setFormData] = useState(defaultForm);
      const [editingIndex, setEditingIndex] = useState(-1);

      // --- 功能 2：自動產生下一個編號 ---
      const generateNextId = () => {
        if (inventory.length === 0) return '1';
        // 找出所有純數字的編號並取最大值
        const numericIds = inventory
          .map(item => parseInt(item.id, 10))
          .filter(num => !isNaN(num));
        
        if (numericIds.length === 0) return '1';
        return (Math.max(...numericIds) + 1).toString();
      };

      // 切換到「建檔」頁面時，自動填入新編號
      useEffect(() => {
        if (activeTab === 'add' && editingIndex === -1 && formData.id === '') {
          setFormData(prev => ({ ...prev, id: generateNextId() }));
        }
      }, [activeTab, inventory]);

      // --- 處理表單輸入 ---
      const handleInputChange = (e) => {
        const { name, value } = e.target;
        if (['XS', 'S', 'M', 'L'].includes(name)) {
          setFormData(prev => ({ ...prev, stock: { ...prev.stock, [name]: parseInt(value) || 0 } }));
        } else {
          setFormData(prev => ({ ...prev, [name]: value }));
        }
      };

      // --- 處理圖片上傳 (轉為 Base64 預覽) ---
      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setFormData(prev => ({ ...prev, image: reader.result }));
          };
          reader.readAsDataURL(file);
        }
      };

      // --- 儲存單一項目 ---
      const handleSave = () => {
        if (!formData.name) return alert('請填寫款式名稱');
        
        if (editingIndex >= 0) {
          const newInventory = [...inventory];
          newInventory[editingIndex] = formData;
          setInventory(newInventory);
        } else {
          setInventory([formData, ...inventory]);
        }
        
        // 重置表單並回到列表
        setFormData({ ...defaultForm, id: generateNextId() }); // 預備下一個編號
        setEditingIndex(-1);
        setActiveTab('list');
      };

      // --- 編輯項目 ---
      const handleEdit = (index) => {
        setFormData(inventory[index]);
        setEditingIndex(index);
        setActiveTab('add');
      };

      // --- 刪除項目 ---
      const handleDelete = (index) => {
        if(confirm('確定要刪除此款式嗎？')) {
          const newInventory = inventory.filter((_, i) => i !== index);
          setInventory(newInventory);
        }
      };

      // --- 功能 1：處理 CSV 批次匯入 ---
      const handleCsvImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          const lines = text.split('\n');
          const newItems = [];
          
          // 假設第一行是標題，從第二行開始讀取 (索引 1)
          for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            // 簡易的 CSV 解析 (處理包含引號的欄位)
            const row = [];
            let cur = '', inQuote = false;
            for (let char of line) {
              if (char === '"') inQuote = !inQuote;
              else if (char === ',' && !inQuote) { row.push(cur); cur = ''; }
              else cur += char;
            }
            row.push(cur);

            // 對應試算表欄位：編號, 款式名稱, 流行描述, 關鍵標籤, 圖片網址(選填)
            if (row.length >= 2) {
              newItems.push({
                id: row[0]?.trim() || '',
                name: row[1]?.trim() || '',
                description: row[2]?.trim() || '',
                hashtags: row[3]?.trim() || '',
                shape: '中長水滴', // 預設甲型
                stock: { XS: 0, S: 0, M: 0, L: 0 },
                image: row[4]?.trim() || '' // 讀取第5欄的圖片網址(若有提供)
              });
            }
          }

          if (newItems.length > 0) {
            setInventory(prev => [...newItems, ...prev]);
            alert(`成功匯入 ${newItems.length} 筆款式！您可以點擊列表為它們上傳照片。`);
            setActiveTab('list');
          } else {
            alert('找不到有效的資料行，請確認 CSV 格式。');
          }
          // 清空 input 確保下次能選同一個檔案
          e.target.value = null; 
        };
        reader.readAsText(file);
      };

      return (
        <div className="min-h-screen pb-[100px] flex flex-col font-sans">
          {/* Header */}
          <header className="bg-white shadow-sm sticky top-0 z-10 px-6 py-4 flex justify-between items-center">
            <div>
              <h1 className="text-xl font-bold text-slate-800">MyNail 管理中心</h1>
              <p className="text-xs text-slate-500 mt-1">
                {activeTab === 'list' ? `目前共 ${inventory.length} 款商品` : (editingIndex >= 0 ? '編輯款式' : '新增款式')}
              </p>
            </div>
            
            {/* 匯出按鈕 (原始功能保留) */}
            {activeTab === 'list' && (
              <button 
                onClick={() => {
                  const headers = ['編號,名稱,甲型,描述,標籤,XS,S,M,L'];
                  const content = [headers, ...inventory.map(i => [i.id, i.name, i.shape, (i.description||"").replace(/,/g,' '), i.hashtags, i.stock.XS, i.stock.S, i.stock.M, i.stock.L].join(','))].join('\n');
                  const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
                  const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `Shop_Inventory.csv`; link.click();
                }}
                className="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 px-4 rounded-full transition-colors font-medium"
              >
                匯出清單
              </button>
            )}
          </header>

          {/* 內容區域 */}
          <main className="flex-1 p-6">
            
            {/* --- 列表模式 --- */}
            {activeTab === 'list' && (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {inventory.length === 0 ? (
                  <div className="col-span-full text-center py-20 text-slate-400 flex flex-col items-center">
                    <IconImage />
                    <p className="mt-4 text-sm">目前沒有款式，點擊下方「建檔」開始新增或匯入</p>
                  </div>
                ) : (
                  inventory.map((item, index) => (
                    <div key={index} className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex animate-fade-in-up">
                      <div className="w-1/3 bg-slate-100 flex items-center justify-center relative">
                        {item.image ? (
                          <img src={item.image} alt={item.name} className="w-full h-full object-cover absolute inset-0" />
                        ) : (
                          <div className="text-slate-300 flex flex-col items-center">
                            <IconImage />
                            <span className="text-[10px] mt-1">缺圖片</span>
                          </div>
                        )}
                      </div>
                      <div className="w-2/3 p-4 flex flex-col">
                        <div className="flex justify-between items-start">
                          <div>
                            <span className="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">#{item.id}</span>
                            <h3 className="font-bold text-slate-800 mt-1">{item.name}</h3>
                          </div>
                        </div>
                        <p className="text-xs text-slate-500 mt-2 line-clamp-2">{item.description}</p>
                        <div className="mt-auto pt-4 flex justify-between items-center">
                          <span className="text-xs text-slate-400">{item.hashtags.split(' ')[0]}</span>
                          <button onClick={() => handleEdit(index)} className="text-sm text-blue-600 font-medium px-3 py-1 bg-blue-50 rounded-lg">
                            編輯/補圖
                          </button>
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {/* --- 建檔/編輯模式 --- */}
            {activeTab === 'add' && (
              <div className="max-w-md mx-auto bg-white rounded-3xl shadow-sm border border-slate-100 p-6 animate-fade-in-up">
                
                {/* 批次匯入區塊 (只有新增時顯示) */}
                {editingIndex === -1 && (
                  <div className="mb-8 p-4 bg-blue-50 rounded-2xl border border-blue-100 flex items-center justify-between">
                    <div>
                      <h4 className="text-sm font-bold text-blue-800">有整理好的 Excel/CSV？</h4>
                      <p className="text-xs text-blue-600 mt-1">一鍵匯入所有文字，後續再補圖。<br/><span className="text-[10px] text-blue-500 font-normal">※若第5欄提供圖片網址會一併載入</span></p>
                    </div>
                    <button 
                      onClick={() => csvInputRef.current.click()}
                      className="flex items-center gap-1 bg-blue-600 text-white text-xs font-bold px-3 py-2 rounded-xl shadow-sm hover:bg-blue-700"
                    >
                      <IconUploadCloud /> 匯入 CSV
                    </button>
                    <input type="file" accept=".csv" ref={csvInputRef} className="hidden" onChange={handleCsvImport} />
                  </div>
                )}

                <div className="space-y-5">
                  <div className="flex gap-4">
                    <div className="w-1/3">
                      <label className="block text-xs font-bold text-slate-500 mb-1">編號</label>
                      <input type="text" name="id" value={formData.id} onChange={handleInputChange} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="001" />
                    </div>
                    <div className="w-2/3">
                      <label className="block text-xs font-bold text-slate-500 mb-1">款式名稱</label>
                      <input type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如: 桃氣春櫻" />
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">圖片上傳</label>
                    <div 
                      onClick={() => fileInputRef.current.click()}
                      className="border-2 border-dashed border-slate-200 rounded-2xl h-40 flex flex-col items-center justify-center bg-slate-50 cursor-pointer overflow-hidden relative hover:bg-slate-100 transition-colors"
                    >
                      {formData.image ? (
                        <img src={formData.image} alt="Preview" className="w-full h-full object-cover" />
                      ) : (
                        <>
                          <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-blue-500 mb-2">
                            <IconPlus />
                          </div>
                          <span className="text-xs text-slate-400 font-medium">點擊上傳商品照片</span>
                        </>
                      )}
                    </div>
                    <input type="file" accept="image/*" ref={fileInputRef} className="hidden" onChange={handleImageUpload} />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">流行描述</label>
                    <textarea name="description" value={formData.description} onChange={handleInputChange} rows="3" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="描述此款式的特色..."></textarea>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">關鍵標籤</label>
                    <input type="text" name="hashtags" value={formData.hashtags} onChange={handleInputChange} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="#3D美甲 #櫻花" />
                  </div>

                  {/* 庫存設定 */}
                  <div className="pt-2">
                    <label className="block text-xs font-bold text-slate-500 mb-2">各尺寸庫存</label>
                    <div className="grid grid-cols-4 gap-2">
                      {['XS', 'S', 'M', 'L'].map(size => (
                        <div key={size} className="bg-slate-50 border border-slate-200 rounded-xl p-2 text-center">
                          <span className="block text-xs font-bold text-slate-700 mb-1">{size}</span>
                          <input type="number" name={size} value={formData.stock[size]} onChange={handleInputChange} className="w-full text-center bg-transparent text-sm focus:outline-none" min="0" />
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="pt-6 flex gap-3">
                    {editingIndex >= 0 && (
                      <button onClick={() => handleDelete(editingIndex)} className="px-4 py-3 rounded-xl border border-red-200 text-red-500 font-bold text-sm hover:bg-red-50">
                        刪除
                      </button>
                    )}
                    <button onClick={handleSave} className="flex-1 bg-slate-900 text-white font-bold py-3 rounded-xl shadow-lg shadow-slate-200 hover:bg-slate-800 transition-colors">
                      {editingIndex >= 0 ? '儲存修改' : '確認新增'}
                    </button>
                  </div>

                </div>
              </div>
            )}
          </main>

          {/* 底部導覽列 (與您原本的架構相同) */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 pb-safe z-50">
            <div className="flex justify-around items-end h-16 max-w-md mx-auto relative px-6">
              
              <button onClick={() => { setActiveTab('list'); setEditingIndex(-1); }} className="flex-1 pb-4 pt-4 flex flex-col items-center justify-center relative">
                <div className={`transition-colors ${activeTab === 'list' ? 'text-blue-600' : 'text-slate-400'}`}>
                  <IconList />
                </div>
                <span className={`text-[10px] font-bold mt-1 ${activeTab === 'list' ? 'text-blue-600' : 'text-slate-400'}`}>商品庫</span>
              </button>
              
              {/* 中央凸起大按鈕 */}
              <button onClick={() => { 
                setActiveTab('add'); 
                setEditingIndex(-1); 
                setFormData({ ...defaultForm, id: generateNextId() }); 
              }} className="relative flex flex-col items-center justify-center -top-6 w-20">
                <div className={`w-14 h-14 rounded-full flex items-center justify-center text-white shadow-xl transition-all ${activeTab === 'add' ? 'bg-blue-600 scale-110 shadow-blue-200' : 'bg-slate-900 shadow-slate-200'}`}>
                  <IconPlus />
                </div>
                <span className={`text-[10px] font-bold mt-2 ${activeTab === 'add' ? 'text-blue-600' : 'text-slate-400'}`}>建檔</span>
              </button>

              <div className="flex-1 pb-4 pt-4 flex flex-col items-center justify-center opacity-0 pointer-events-none">
                {/* 佔位符以保持排版平衡 */}
              </div>

            </div>
          </nav>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
